        // ================================================================
        //  CONTROLES E EVENTOS
        // ================================================================
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
            if (e.key === 'r' || e.key === 'R') loadGame();
            if (!sound.initialized) sound.init();
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        function togglePause() {
            paused = !paused;
            if (paused) {
                statusSpan.textContent = '⏸️ Pausado';
                sound.stopMusic();
            } else {
                if (sound.enabled) sound.playMusic();
                statusSpan.textContent = '▶ Jogando';
            }
            updateUI();
        }

        function setupVirtualControls() {
            function setVirtKey(key, value) {
                if (key === 'ArrowLeft') virtKeys.left = value;
                else if (key === 'ArrowRight') virtKeys.right = value;
                else if (key === 'ArrowUp') virtKeys.up = value;
                else if (key === 'ArrowDown') virtKeys.down = value;
                else if (key === 'a') virtKeys.jump = value;
                else if (key === 'b') virtKeys.shoot = value;
            }
            const buttons = document.querySelectorAll('[data-key]');
            buttons.forEach(btn => {
                const key = btn.dataset.key;
                if (!key) return;
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    btn.classList.add('active');
                    setVirtKey(key, true);
                    if (!sound.initialized) sound.init();
                }, { passive: false });
                btn.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const touch = e.changedTouches[0];
                    const rect = btn.getBoundingClientRect();
                    const inside = touch.clientX >= rect.left && touch.clientX <= rect.right &&
                        touch.clientY >= rect.top && touch.clientY <= rect.bottom;
                    if (!inside) {
                        btn.classList.remove('active');
                        setVirtKey(key, false);
                    } else {
                        btn.classList.add('active');
                        setVirtKey(key, true);
                    }
                }, { passive: false });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    btn.classList.remove('active');
                    setVirtKey(key, false);
                }, { passive: false });
                btn.addEventListener('touchcancel', (e) => {
                    btn.classList.remove('active');
                    setVirtKey(key, false);
                }, { passive: false });
                btn.addEventListener('mousedown', (e) => {
                    btn.classList.add('active');
                    setVirtKey(key, true);
                    if (!sound.initialized) sound.init();
                });
                btn.addEventListener('mouseup', (e) => {
                    btn.classList.remove('active');
                    setVirtKey(key, false);
                });
                btn.addEventListener('mouseleave', (e) => {
                    btn.classList.remove('active');
                    setVirtKey(key, false);
                });
            });

            document.getElementById('restartBtn').addEventListener('click', loadGame);
            document.getElementById('backBtn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            document.getElementById('controlsOverlay').addEventListener('touchstart', (e) => {
                if (e.target.closest('.dpad-btn') || e.target.closest('.btn-action') || e.target.closest(
                        '.btn-restart') || e.target.closest('.btn-sound') || e.target.closest('.btn-back')) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        // ================================================================
        //  COLISÕES E ATUALIZAÇÕES
        // ================================================================
        function handleEnemyCollisions() {
            for (const enemy of enemies) {
                if (!enemy.alive || enemy.squished || !player.alive) continue;
                const px = player.x,
                    py = player.y;
                const ex = enemy.x,
                    ey = enemy.y;
                const ew = enemy.type === 'lavamonster' ? enemy.w * 1.4 : enemy.w;
                const eh = enemy.type === 'lavamonster' ? enemy.h * 1.4 : enemy.h;
                if (px + player.w > ex + 4 && px < ex + ew - 4 &&
                    py + player.h > ey + 4 && py < ey + eh - 4) {
                    if (player.invincible) {
                        enemy.squish();
                        player.vy = -4;
                        score += 150;
                        updateUI();
                        continue;
                    }
                    if (player.vy > 0 && py + player.h - ey < 20) {
                        enemy.squish();
                        player.vy = -6;
                        score += 100;
                        updateUI();
                    } else {
                        if (player.invincibleFrames === 0) {
                            player.die();
                        }
                    }
                }
            }
        }

        function handleProjectileCollisions() {
            for (const proj of projectiles) {
                if (!proj.alive) continue;
                for (const enemy of enemies) {
                    if (!enemy.alive || enemy.squished) continue;
                    const ew = enemy.type === 'lavamonster' ? enemy.w * 1.4 : enemy.w;
                    const eh = enemy.type === 'lavamonster' ? enemy.h * 1.4 : enemy.h;
                    if (proj.x + proj.w > enemy.x && proj.x < enemy.x + ew &&
                        proj.y + proj.h > enemy.y && proj.y < enemy.y + eh) {
                        enemy.squish();
                        proj.alive = false;
                        score += 150;
                        updateUI();
                        emitParticles(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 20, {
                            color: '#ff8800',
                            radius: 4,
                            speed: 4,
                            life: 25,
                            gravity: 0.03,
                            vy: -1.5,
                            type: 'spark'
                        });
                        break;
                    }
                }
            }
        }

        function updateCamera(targetX) {
            const halfW = W / 2;
            let target = targetX - halfW;
            target = Math.max(0, Math.min(target, LEVEL_WIDTH - W));
            camera.x += (target - camera.x) * 0.1;
        }

        // ================================================================
        //  DESENHO DO CENÁRIO (vulcão)
        // ================================================================
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, skyGrad[0] || '#1a0a0a');
            grad.addColorStop(0.5, '#2a1a0a');
            grad.addColorStop(1, skyGrad[1] || '#3a1a0a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Vulcão ao fundo
            const volcanos = [
                { x: 200, w: 300, h: 150, c: '#3a1a0a' },
                { x: 600, w: 250, h: 120, c: '#2a1a0a' },
                { x: 1000, w: 350, h: 170, c: '#3a1a0a' },
                { x: 1400, w: 200, h: 100, c: '#2a1a0a' },
                { x: 1800, w: 300, h: 140, c: '#3a1a0a' },
                { x: 2200, w: 250, h: 130, c: '#2a1a0a' },
                { x: 2600, w: 350, h: 160, c: '#3a1a0a' },
                { x: 3000, w: 200, h: 110, c: '#2a1a0a' },
                { x: 3400, w: 300, h: 150, c: '#3a1a0a' },
                { x: 3800, w: 250, h: 120, c: '#2a1a0a' },
            ];
            const scroll = camera.x * 0.1;
            for (const v of volcanos) {
                const sx = v.x - scroll * 0.2;
                if (sx + v.w < -50 || sx > W + 50) continue;
                ctx.fillStyle = v.c;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.moveTo(sx, GROUND_Y + 20);
                ctx.quadraticCurveTo(sx + v.w * 0.2, GROUND_Y - v.h + 20, sx + v.w * 0.5, GROUND_Y - v.h * 0.9 + 20);
                ctx.quadraticCurveTo(sx + v.w * 0.8, GROUND_Y - v.h + 20, sx + v.w, GROUND_Y + 20);
                ctx.fill();
                // Fumaça/lava no topo
                if (v.x % 800 < 100) {
                    ctx.fillStyle = 'rgba(255,100,0,0.1)';
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 30;
                    for (let i = 0; i < 5; i++) {
                        const px = sx + v.w * 0.3 + i * v.w * 0.1 + Math.sin(i * 0.5 + frameCount * 0.01) * 10;
                        const py = GROUND_Y - v.h * 0.8 + Math.sin(i * 0.7 + frameCount * 0.015) * 10;
                        ctx.beginPath();
                        ctx.arc(px, py, 15 + Math.sin(i + frameCount * 0.02) * 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            ctx.shadowBlur = 0;

            // Lava glow no fundo
            const glow = ctx.createRadialGradient(W / 2, GROUND_Y - 50, 50, W / 2, GROUND_Y - 50, 300);
            glow.addColorStop(0, 'rgba(255,50,0,0.05)');
            glow.addColorStop(1, 'rgba(255,50,0,0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, W, H);
        }

        function drawGround() {
            for (const seg of groundSegments) {
                const sx = seg.x - camera.x;
                if (sx + seg.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = groundTop;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillRect(sx, seg.y, seg.w, 6);
                ctx.shadowBlur = 0;
                const grad = ctx.createLinearGradient(0, seg.y + 6, 0, seg.y + seg.h);
                grad.addColorStop(0, groundBody[0]);
                grad.addColorStop(1, groundBody[1]);
                ctx.fillStyle = grad;
                ctx.fillRect(sx, seg.y + 6, seg.w, seg.h - 6);
                // Fissuras de lava
                ctx.fillStyle = 'rgba(255,100,0,0.15)';
                for (let i = 0; i < seg.w; i += 40) {
                    const fx = sx + i + Math.sin(i * 0.5 + seg.x) * 6;
                    ctx.fillRect(fx, seg.y + 8 + Math.sin(i * 0.3) * 4, 4, 8 + Math.sin(i * 0.7) * 4);
                }
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(sx, seg.y + seg.h - 3, seg.w, 3);
            }

            // Lava pits
            for (const lava of lavaPits) {
                const sx = lava.x - camera.x;
                if (sx + lava.w < -20 || sx > W + 20) continue;
                const grad = ctx.createLinearGradient(sx, lava.y - 10, sx, lava.y + 20);
                grad.addColorStop(0, 'rgba(255,100,0,0.8)');
                grad.addColorStop(0.5, 'rgba(255,50,0,0.9)');
                grad.addColorStop(1, 'rgba(200,30,0,0.7)');
                ctx.fillStyle = grad;
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 30;
                ctx.fillRect(sx, lava.y - 5, lava.w, 20);
                // Bolhas de lava
                ctx.shadowBlur = 15;
                for (let i = 0; i < 3; i++) {
                    const bx = sx + 10 + i * 15 + Math.sin(frameCount * 0.02 + i * 2) * 5;
                    const by = lava.y - 2 + Math.sin(frameCount * 0.03 + i * 1.5) * 6;
                    ctx.fillStyle = `rgba(255, 200, 50, ${0.3 + Math.sin(frameCount * 0.04 + i) * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(bx, by, 3 + Math.sin(frameCount * 0.02 + i) * 1, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            ctx.shadowBlur = 0;
        }

        function drawPlatformsAndBlocks() {
            for (const plat of platforms) {
                const sx = plat.x - camera.x;
                if (sx + plat.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = '#4a2a1a';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillRect(sx, plat.y, plat.w, plat.h);
                ctx.fillStyle = '#3a1a0a';
                ctx.fillRect(sx, plat.y + plat.h - 4, plat.w, 4);
                ctx.fillStyle = '#5a3a2a';
                ctx.fillRect(sx, plat.y, plat.w, 3);
                for (let i = 0; i < plat.w; i += 20) {
                    ctx.fillStyle = '#2a0a0a';
                    ctx.fillRect(sx + i, plat.y + 4, 1, plat.h - 8);
                }
                ctx.shadowBlur = 0;
            }

            for (const mplat of movingPlatforms) {
                const sx = mplat.x - camera.x;
                if (sx + mplat.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = '#4a2a1a';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillRect(sx, mplat.y, mplat.w, mplat.h);
                ctx.fillStyle = '#3a1a0a';
                ctx.fillRect(sx, mplat.y + mplat.h - 4, mplat.w, 4);
                ctx.fillStyle = '#5a3a2a';
                ctx.fillRect(sx, mplat.y, mplat.w, 3);
                for (let i = 0; i < mplat.w; i += 20) {
                    ctx.fillStyle = '#2a0a0a';
                    ctx.fillRect(sx + i, mplat.y + 4, 1, mplat.h - 8);
                }
                ctx.shadowBlur = 0;
            }

            for (const block of questionBlocks) {
                const sx = block.x - camera.x;
                if (sx + block.w < -20 || sx > W + 20) continue;
                if (block.used) {
                    ctx.fillStyle = '#3a1a0a';
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(sx, block.y, block.w, block.h);
                    ctx.fillStyle = '#2a0a0a';
                    ctx.fillRect(sx + 2, block.y + 2, block.w - 4, block.h - 4);
                    ctx.shadowBlur = 0;
                    continue;
                }
                const grad = ctx.createLinearGradient(sx, block.y, sx, block.y + block.h);
                grad.addColorStop(0, '#f1c40f');
                grad.addColorStop(1, '#d4a017');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(241,196,15,0.3)';
                ctx.fillRect(sx, block.y, block.w, block.h);
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(sx + 3, block.y + 3, block.w - 6, block.h - 6);
                ctx.fillStyle = '#d4a017';
                ctx.fillRect(sx, block.y, block.w, 2);
                ctx.fillRect(sx, block.y, 2, block.h);
                ctx.fillRect(sx + block.w - 2, block.y, 2, block.h);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('?', sx + block.w / 2, block.y + block.h / 2 + 1);
            }
            ctx.shadowBlur = 0;
        }

        function drawPipes(offsetX) {
            for (const pipe of pipes) {
                const sx = pipe.x - offsetX;
                if (sx + pipe.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = '#2e7d32';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillRect(sx + 4, pipe.y, pipe.w - 8, pipe.h);
                ctx.fillStyle = '#388e3c';
                ctx.fillRect(sx, pipe.y - 6, pipe.w, 8);
                ctx.fillStyle = '#1b5e20';
                ctx.fillRect(sx + 2, pipe.y - 4, pipe.w - 4, 4);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(sx + 2, pipe.y + 4, 4, pipe.h - 8);
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.fillRect(sx + 6, pipe.y + 8, 4, pipe.h - 16);
                if (pipe.type === 'entry') {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('▼', sx + pipe.w / 2, pipe.y - 10);
                }
                ctx.shadowBlur = 0;
            }
        }

        function drawCoins(offsetX) {
            for (const coin of coins) {
                const sx = coin.x - offsetX;
                const sy = coin.y + Math.sin(frameCount * 0.06 + coin.x) * 2;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.4)';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(sx + coin.w / 2, sy + coin.h / 2, coin.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffaa00';
                ctx.font = '8px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', sx + coin.w / 2, sy + coin.h / 2 + 1);
                ctx.shadowBlur = 0;
            }
        }

        function drawSpikesAndCheckpoints() {
            for (const spike of spikes) {
                const sx = spike.x - camera.x;
                const sy = spike.y;
                if (sx + spike.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = '#6b3a2a';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(80,30,20,0.3)';
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + spike.w / 2, sy - spike.h);
                ctx.lineTo(sx + spike.w, sy);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#8a5a4a';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(sx + 2, sy - 2);
                ctx.lineTo(sx + spike.w / 2, sy - spike.h + 2);
                ctx.lineTo(sx + spike.w - 2, sy - 2);
                ctx.closePath();
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            for (const cp of checkpoints) {
                const sx = cp.x - camera.x;
                const sy = cp.y;
                if (sx + cp.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = cp.active ? '#2ecc71' : '#5a3a2a';
                ctx.shadowColor = cp.active ? 'rgba(46,204,113,0.6)' : 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(sx + cp.w / 2, sy + cp.h / 2, cp.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚑', sx + cp.w / 2, sy + cp.h / 2 + 1);
            }
            ctx.shadowBlur = 0;
        }

        function drawFlag() {
            const fx = FLAG_X - camera.x;
            const fy = FLAG_Y;
            if (fx < -40 || fx > W + 40) return;
            ctx.fillStyle = '#5d4037';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillRect(fx + 10, fy, 6, 90);
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(fx + 12, fy, 2, 90);
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = 'rgba(241,196,15,0.5)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(fx + 13, fy - 4, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            const wave = Math.sin(frameCount * 0.04) * 3;
            if (!levelComplete && !gameWon) {
                ctx.fillStyle = '#ecf0f1';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.beginPath();
                ctx.moveTo(fx + 16, fy + 8);
                ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
                ctx.fill();
                ctx.strokeStyle = '#bdc3c7';
                ctx.lineWidth = 1;
                ctx.stroke();
            } else {
                ctx.shadowColor = 'rgba(255,255,255,0.6)';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(fx + 16, fy + 8);
                ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 20;
                ctx.fillText('★', fx + 28 + wave * 0.5, fy + 20);
            }
            ctx.shadowBlur = 0;
        }

        // ================================================================
        //  LOOP PRINCIPAL
        // ================================================================
        function gameLoop() {
            if (!paused) {
                frameCount++;

                for (const mplat of movingPlatforms) {
                    mplat.x += mplat.speed * mplat.dir;
                    if (mplat.x >= mplat.xMax || mplat.x <= mplat.xMin) mplat.dir *= -1;
                    mplat.vx = mplat.speed * mplat.dir;
                }

                if (levelComplete && nextLevelTimer > 0) {
                    nextLevelTimer--;
                    if (nextLevelTimer === 0) {
                        window.location.href = 'index.html';
                    }
                }

                if (!gameWon && !gameOver && lives > 0 && !levelComplete) {
                    if ((keys['z'] || keys['Z'] || keys['x'] || keys['X'] || virtKeys.shoot) && player.alive && !
                        enteringPipe) {
                        player.shoot();
                    }
                    player.update();
                    if (player.alive) updateCamera(player.x);

                    enemies = enemies.filter(e => e.update());
                    powerUps = powerUps.filter(pu => pu.update());
                    projectiles = projectiles.filter(p => p.update());
                    enemyProjectiles = enemyProjectiles.filter(ep => ep.update());
                    particles = particles.filter(p => p.update());

                    handleEnemyCollisions();
                    handleProjectileCollisions();

                    if (!player.alive && lives <= 0) {
                        gameOver = true;
                        statusSpan.textContent = '💀 GAME OVER';
                        sound.playSound('gameOver');
                    }
                    updateUI();
                }
            }

            ctx.clearRect(0, 0, W, H);
            drawBackground();
            drawGround();
            drawPlatformsAndBlocks();
            drawPipes(camera.x);
            drawCoins(camera.x);
            drawSpikesAndCheckpoints();

            for (const pu of powerUps) pu.draw(ctx, camera.x);
            for (const enemy of enemies) enemy.draw(ctx, camera.x);
            for (const ep of enemyProjectiles) ep.draw(ctx, camera.x);
            for (const proj of projectiles) proj.draw(ctx, camera.x);
            if (player) player.draw(ctx, camera.x);
            drawFlag();

            for (const p of particles) {
                p.draw(ctx, camera.x);
            }

            if (gameWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 52px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 20;
                ctx.fillText('🏆 VITÓRIA!', W / 2, H / 2 - 20);
                ctx.font = '24px Arial';
                ctx.fillText('Parabéns!', W / 2, H / 2 + 50);
                ctx.shadowBlur = 0;
            } else if (gameOver || lives <= 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 52px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 20;
                ctx.fillText('💀 GAME OVER', W / 2, H / 2 - 10);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText('Reinicie ou volte ao mapa', W / 2, H / 2 + 60);
                ctx.shadowBlur = 0;
            } else if (levelComplete && nextLevelTimer > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                ctx.fillText('⭐ Fase concluída!', W / 2, H / 2 - 10);
                ctx.font = '22px Arial';
                ctx.fillText('Voltando ao mapa...', W / 2, H / 2 + 50);
                ctx.shadowBlur = 0;
            } else if (paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 20;
                ctx.fillText('⏸️ PAUSADO', W / 2, H / 2);
                ctx.shadowBlur = 0;
            }

            const progress = Math.min(1, (player ? player.x : 0) / (LEVEL_WIDTH - 100));
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.roundRect(W - 170, 12, 150, 10, 6);
            ctx.fill();
            ctx.fillStyle = '#ff4400';
            ctx.beginPath();
            ctx.roundRect(W - 170, 12, Math.max(4, progress * 150), 10, 6);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('VULCÃO', W - 95, 12);

            requestAnimationFrame(gameLoop);
        }

        // ================================================================
        //  INICIALIZAÇÃO
        // ================================================================
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        document.addEventListener('click', () => { if (!sound.initialized) sound.init(); }, { once: true });
        document.addEventListener('touchstart', () => { if (!sound.initialized) sound.init(); }, { once: true });

        document.getElementById('soundBtn').addEventListener('click', () => {
            if (!sound.initialized) sound.init();
            const enabled = sound.toggleSound();
            document.getElementById('soundBtn').textContent = enabled ? '🔊 Som' : '🔇 Mudo';
        });

        loadGame();
        setupVirtualControls();
        gameLoop();

        console.log('🌋 Fase 8 - Vulcão Ardente carregada com sucesso!');
        console.log(`📊 Inimigos: ${enemies.length} (incluindo slimes, firebats e lava monsters)`);
    </script>
</body>
