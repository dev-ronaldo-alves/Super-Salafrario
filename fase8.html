        ];

        const movingPlatforms = [
            { x: 700, y: 340, w: 80, h: 16, xMin: 620, xMax: 820, speed: 0.5, dir: 1 },
            { x: 1200, y: 340, w: 80, h: 16, xMin: 1120, xMax: 1320, speed: 0.6, dir: -1 },
            { x: 1900, y: 340, w: 80, h: 16, xMin: 1820, xMax: 2020, speed: 0.5, dir: 1 },
            { x: 2600, y: 340, w: 80, h: 16, xMin: 2520, xMax: 2720, speed: 0.6, dir: -1 },
        ];

        const questionBlocks = [
            { x: 200, y: 355, w: 36, h: 36, powerUp: 'fire' },
            { x: 600, y: 355, w: 36, h: 36, powerUp: 'cape' },
            { x: 1000, y: 355, w: 36, h: 36, powerUp: 'star' },
            { x: 1400, y: 355, w: 36, h: 36, powerUp: 'fire' },
            { x: 1800, y: 355, w: 36, h: 36, powerUp: 'cape' },
            { x: 2200, y: 355, w: 36, h: 36, powerUp: 'star' },
            { x: 2600, y: 355, w: 36, h: 36, powerUp: 'fire' },
            { x: 3000, y: 355, w: 36, h: 36, powerUp: 'cape' },
        ];

        const coinsData = [];
        for (let x = 100; x < LEVEL_WIDTH - 100; x += 80) {
            const y = GROUND_Y - 40 - Math.sin(x * 0.08) * 25 - 10;
            coinsData.push({ x: x, y: y, w: 12, h: 12 });
            if (x % 160 < 20) {
                coinsData.push({ x: x + 25, y: y - 20, w: 12, h: 12 });
            }
        }

        // Espinhos de rocha vulcânica
        const spikes = [
            { x: 300, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 320, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 950, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 970, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 1850, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 1870, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 2450, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 2470, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 2900, y: GROUND_Y - 16, w: 20, h: 16 },
            { x: 2920, y: GROUND_Y - 16, w: 20, h: 16 },
        ];

        const checkpointsData = [
            { x: 700, y: GROUND_Y - 20, w: 20, h: 20, active: false },
            { x: 1500, y: GROUND_Y - 20, w: 20, h: 20, active: false },
            { x: 2400, y: GROUND_Y - 20, w: 20, h: 20, active: false },
        ];

        // NOVOS INIMIGOS: lava monster, fire bat, magma slime
        const enemyData = [
            // Magma Slime (pequeno, salta)
            { x: 150, y: GROUND_Y - 32, type: 'slime' },
            { x: 550, y: GROUND_Y - 32, type: 'slime' },
            { x: 950, y: GROUND_Y - 32, type: 'slime' },
            { x: 1350, y: GROUND_Y - 32, type: 'slime' },
            { x: 1750, y: GROUND_Y - 32, type: 'slime' },
            { x: 2150, y: GROUND_Y - 32, type: 'slime' },
            { x: 2550, y: GROUND_Y - 32, type: 'slime' },
            { x: 2950, y: GROUND_Y - 32, type: 'slime' },
            // Fire Bat (voa, solta fogo)
            { x: 400, y: GROUND_Y - 70, type: 'firebat' },
            { x: 800, y: GROUND_Y - 80, type: 'firebat' },
            { x: 1200, y: GROUND_Y - 70, type: 'firebat' },
            { x: 1600, y: GROUND_Y - 80, type: 'firebat' },
            { x: 2000, y: GROUND_Y - 70, type: 'firebat' },
            { x: 2400, y: GROUND_Y - 80, type: 'firebat' },
            { x: 2800, y: GROUND_Y - 70, type: 'firebat' },
            { x: 3200, y: GROUND_Y - 80, type: 'firebat' },
            // Lava Monster (grande, lento, resistente)
            { x: 500, y: GROUND_Y - 40, type: 'lavamonster' },
            { x: 1100, y: GROUND_Y - 40, type: 'lavamonster' },
            { x: 1700, y: GROUND_Y - 40, type: 'lavamonster' },
            { x: 2300, y: GROUND_Y - 40, type: 'lavamonster' },
            { x: 2900, y: GROUND_Y - 40, type: 'lavamonster' },
        ];

        const pipes = [
            { x: 450, y: GROUND_Y - 60, w: 40, h: 60, type: 'entry', targetLevel: 10, exitX: 100, exitY: GROUND_Y -
                    40 },
            { x: 1600, y: GROUND_Y - 60, w: 40, h: 60, type: 'entry', targetLevel: 11, exitX: 150, exitY: GROUND_Y -
                    40 },
        ];

        const skyGrad = ['#1a0a0a', '#3a1a0a'];
        const groundTop = '#4a2a1a';
        const groundBody = ['#3a1a0a', '#1a0a0a'];

        // ================================================================
        //  ESTADO DO JOGO
        // ================================================================
        let player = null;
        let enemies = [];
        let powerUps = [];
        let projectiles = [];
        let enemyProjectiles = [];
        let coins = [];
        let checkpoints = [];
        let score = 0,
            lives = 3,
            totalCoins = 0;
        let gameWon = false,
            gameOver = false,
            levelComplete = false,
            paused = false;
        let camera = { x: 0 };
        let frameCount = 0;
        let nextLevelTimer = 0;
        let enteringPipe = false;
        let checkpointX = -1,
            checkpointY = -1;

        const virtKeys = { left: false, right: false, up: false, down: false, jump: false, shoot: false };

        // ================================================================
        //  CLASSE PLAYER
        // ================================================================
        class Player {
            constructor() {
                this.x = 60;
                this.y = GROUND_Y - 40;
                this.w = 28;
                this.h = 36;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.facing = 1;
                this.hasPower = false;
                this.hasCape = false;
                this.capeTimer = 0;
                this.isGliding = false;
                this.invincibleTimer = 0;
                this.invincible = false;
                this.shootCooldown = 0;
                this.alive = true;
                this.invincibleFrames = 0;
                this.animFrame = 0;
                this.animTimer = 0;
                this.bufferTimer = 0;
            }

            update() {
                if (!this.alive || enteringPipe || paused) return;

                if (this.bufferTimer > 0) this.bufferTimer--;
                if (virtKeys.jump || keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) {
                    if (!this.onGround) this.bufferTimer = 8;
                }

                let move = 0;
                if (keys['ArrowLeft'] || keys['a'] || keys['A'] || virtKeys.left) move = -1;
                if (keys['ArrowRight'] || keys['d'] || keys['D'] || virtKeys.right) move = 1;
                if (move !== 0) {
                    this.vx += move * 0.9;
                    this.facing = move;
                } else {
                    this.vx *= FRICTION;
                }
                this.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, this.vx));
                this.x += this.vx;

                const jumpRequest = (this.bufferTimer > 0 && this.onGround) || (this.onGround && (virtKeys.jump || keys[
                    ' '] || keys['ArrowUp'] || keys['w'] || keys['W']));
                if (jumpRequest && this.onGround) {
                    this.vy = JUMP_FORCE;
                    this.onGround = false;
                    this.bufferTimer = 0;
                    sound.playSound('jump');
                    emitParticles(this.x + this.w / 2, this.y + this.h, 8, {
                        color: '#ff6622',
                        radius: 3,
                        speed: 2,
                        life: 20,
                        gravity: 0.1,
                        vy: -1,
                        type: 'fire'
                    });
                }

                if (this.hasCape && !this.onGround && (virtKeys.jump || keys[' '] || keys['ArrowUp'] || keys['w'] || keys[
                        'W']) && this.capeTimer > 0) {
                    this.vy = Math.min(this.vy, -2.5);
                    this.vy -= 0.18;
                    this.isGliding = true;
                    this.capeTimer--;
                    if (this.capeTimer % 4 === 0) {
                        sound.playSound('cape');
                        emitParticles(this.x + this.w / 2, this.y + this.h / 2, 2, {
                            color: '#ff8844',
                            radius: 4,
                            speed: 1.5,
                            life: 15,
                            gravity: -0.05,
                            vy: -1,
                            type: 'fire'
                        });
                    }
                } else {
                    this.isGliding = false;
                }

                if (!this.isGliding) {
                    this.vy += GRAVITY;
                } else {
                    this.vy += 0.08;
                }
                if (this.vy > 12) this.vy = 12;
                this.y += this.vy;

                this.onGround = false;
                // Colisão com chão
                for (const seg of groundSegments) {
                    if (this.x + this.w > seg.x + 6 && this.x < seg.x + seg.w - 6) {
                        if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 10) {
                            this.y = seg.y - this.h;
                            this.vy = 0;
                            this.onGround = true;
                            this.capeTimer = 40;
                            if (Math.abs(this.vx) > 1) {
                                emitParticles(this.x + this.w / 2, this.y + this.h, 3, {
                                    color: '#4a2a1a',
                                    radius: 2,
                                    speed: 1,
                                    life: 15,
                                    gravity: 0.05,
                                    vy: -0.5,
                                    type: 'rock'
                                });
                            }
                        }
                    }
                }
                // Verificar se caiu na lava
                for (const lava of lavaPits) {
                    if (this.x + this.w > lava.x + 4 && this.x < lava.x + lava.w - 4) {
                        if (this.y + this.h > lava.y - 5 && this.y < lava.y + 20) {
                            if (!this.invincible) {
                                this.die();
                                emitParticles(this.x + this.w / 2, lava.y, 20, {
                                    color: '#ff4400',
                                    radius: 5,
                                    speed: 4,
                                    life: 30,
                                    gravity: 0.02,
                                    vy: -2,
                                    type: 'lava'
                                });
                            }
                        }
                    }
                }

                for (const plat of platforms) {
                    if (this.vy >= 0 &&
                        this.x + this.w > plat.x + 4 && this.x < plat.x + plat.w - 4 &&
                        this.y + this.h > plat.y && this.y < plat.y + plat.h + 12) {
                        this.y = plat.y - this.h;
                        this.vy = 0;
                        this.onGround = true;
                        this.capeTimer = 40;
                    }
                }
                for (const mplat of movingPlatforms) {
                    if (this.vy >= 0 &&
                        this.x + this.w > mplat.x + 4 && this.x < mplat.x + mplat.w - 4 &&
                        this.y + this.h > mplat.y && this.y < mplat.y + mplat.h + 12) {
                        this.y = mplat.y - this.h;
                        this.vy = 0;
                        this.onGround = true;
                        this.capeTimer = 40;
                        this.x += mplat.vx || 0;
                    }
                }
                for (const pipe of pipes) {
                    if (pipe.type === 'entry') {
                        if (this.vy >= 0 &&
                            this.x + this.w > pipe.x + 4 && this.x < pipe.x + pipe.w - 4 &&
                            this.y + this.h >= pipe.y && this.y + this.h < pipe.y + 12) {
                            this.y = pipe.y - this.h;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                }

                if (this.x < 0) this.x = 0;
                if (this.x + this.w > LEVEL_WIDTH) this.x = LEVEL_WIDTH - this.w;
                if (this.y > H + 50) {
                    if (checkpointX >= 0) {
                        this.x = checkpointX;
                        this.y = checkpointY;
                        this.vy = 0;
                        this.vx = 0;
                    } else {
                        this.die();
                    }
                }

                if (this.shootCooldown > 0) this.shootCooldown--;
                if (this.invincibleFrames > 0) this.invincibleFrames--;
                if (this.invincibleTimer > 0) {
                    this.invincibleTimer--;
                    this.invincible = true;
                    if (this.invincibleTimer === 0) this.invincible = false;
                }

                if (Math.abs(this.vx) > 0.5) {
                    this.animTimer++;
                    if (this.animTimer > 5) { this.animTimer = 0;
                        this.animFrame = (this.animFrame + 1) % 4; }
                } else {
                    this.animFrame = 0;
                    this.animTimer = 0;
                }

                for (const block of questionBlocks) {
                    if (block.used) continue;
                    if (this.vy < 0 &&
                        this.x + this.w > block.x + 4 && this.x < block.x + block.w - 4 &&
                        this.y > block.y + block.h - 8 && this.y < block.y + block.h + 4) {
                        block.used = true;
                        this.vy = 2;
                        const pu = new PowerUp(block.x + 4, block.y - 30, block.powerUp);
                        powerUps.push(pu);
                        sound.playSound('powerup');
                        emitParticles(block.x + block.w / 2, block.y, 15, {
                            color: '#ffdd44',
                            radius: 4,
                            speed: 3,
                            life: 25,
                            gravity: 0.05,
                            vy: -2,
                            type: 'star'
                        });
                    }
                }

                for (let i = powerUps.length - 1; i >= 0; i--) {
                    const pu = powerUps[i];
                    if (this.x + this.w > pu.x + 4 && this.x < pu.x + pu.w - 4 &&
                        this.y + this.h > pu.y + 4 && this.y < pu.y + pu.h - 4) {
                        if (pu.type === 'fire') {
                            this.hasPower = true;
                            sound.playSound('powerup');
                            emitParticles(pu.x + pu.w / 2, pu.y + pu.h / 2, 20, {
                                color: '#ff6600',
                                radius: 5,
                                speed: 4,
                                life: 30,
                                gravity: 0.02,
                                vy: -1,
                                type: 'spark'
                            });
                        } else if (pu.type === 'cape') {
                            this.hasCape = true;
                            this.capeTimer = 80;
                            sound.playSound('cape');
                            emitParticles(pu.x + pu.w / 2, pu.y + pu.h / 2, 20, {
                                color: '#e74c3c',
                                radius: 5,
                                speed: 3,
                                life: 25,
                                gravity: 0.02,
                                vy: -1,
                                type: 'star'
                            });
                        } else if (pu.type === 'star') {
                            this.invincibleTimer = 600;
                            this.invincible = true;
                            sound.playSound('star');
                            emitParticles(pu.x + pu.w / 2, pu.y + pu.h / 2, 30, {
                                color: '#f1c40f',
                                radius: 6,
                                speed: 5,
                                life: 35,
                                gravity: 0.01,
                                vy: -2,
                                type: 'star'
                            });
                        }
                        powerUps.splice(i, 1);
                        score += 50;
                        updateUI();
                    }
                }

                for (let i = coins.length - 1; i >= 0; i--) {
                    const coin = coins[i];
                    if (this.x + this.w > coin.x && this.x < coin.x + coin.w &&
                        this.y + this.h > coin.y && this.y < coin.y + coin.h) {
                        coins.splice(i, 1);
                        totalCoins++;
                        score += 100;
                        sound.playSound('coin');
                        emitParticles(coin.x + coin.w / 2, coin.y + coin.h / 2, 10, {
                            color: '#ffd700',
                            radius: 3,
                            speed: 2,
                            life: 20,
                            gravity: 0.05,
                            vy: -1.5,
                            type: 'circle'
                        });
                        updateUI();
                    }
                }

                for (const cp of checkpoints) {
                    if (!cp.active &&
                        this.x + this.w > cp.x && this.x < cp.x + cp.w &&
                        this.y + this.h > cp.y && this.y < cp.y + cp.h) {
                        cp.active = true;
                        checkpointX = cp.x;
                        checkpointY = cp.y - this.h;
                        sound.playSound('checkpoint');
                        statusSpan.textContent = '🏁 Checkpoint!';
                        emitParticles(cp.x + cp.w / 2, cp.y + cp.h / 2, 20, {
                            color: '#2ecc71',
                            radius: 5,
                            speed: 3,
                            life: 30,
                            gravity: 0.02,
                            vy: -1,
                            type: 'star'
                        });
                        setTimeout(() => { if (!gameWon && !gameOver) statusSpan.textContent = '▶ Jogando'; }, 800);
                    }
                }

                for (const spike of spikes) {
                    if (this.x + this.w > spike.x && this.x < spike.x + spike.w &&
                        this.y + this.h > spike.y && this.y < spike.y + spike.h) {
                        if (!this.invincible) this.die();
                    }
                }

                // Colisão com projéteis inimigos
                for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                    const ep = enemyProjectiles[i];
                    if (!ep.alive) continue;
                    if (this.x + this.w > ep.x + 4 && this.x < ep.x + ep.w - 4 &&
                        this.y + this.h > ep.y + 4 && this.y < ep.y + ep.h - 4) {
                        if (!this.invincible) {
                            this.die();
                            ep.alive = false;
                        }
                    }
                }

                if (!levelComplete && this.x + this.w > FLAG_X && this.x < FLAG_X + 30 && this.y + this.h > FLAG_Y + 10) {
                    levelComplete = true;
                    sound.playSound('levelComplete');
                    emitParticles(FLAG_X + 15, FLAG_Y + 20, 40, {
                        color: '#ffffff',
                        radius: 6,
                        speed: 5,
                        life: 40,
                        gravity: 0.01,
                        vy: -3,
                        type: 'star'
                    });
                    statusSpan.textContent = '⭐ Fase concluída!';
                    nextLevelTimer = 120;
                }

                const downPressed = (virtKeys.down || keys['ArrowDown'] || keys['s'] || keys['S']);
                if (downPressed && this.onGround) {
                    for (const pipe of pipes) {
                        if (pipe.type === 'entry' &&
                            this.x + this.w > pipe.x + 4 && this.x < pipe.x + pipe.w - 4 &&
                            Math.abs(this.y + this.h - pipe.y) < 3) {
                            enterPipe(pipe);
                            break;
                        }
                    }
                }
            }

            shoot() {
                if (!this.hasPower || this.shootCooldown > 0 || !this.alive || gameWon || levelComplete || enteringPipe ||
                    paused) return false;
                const proj = new Projectile(
                    this.x + (this.facing === 1 ? this.w : -8),
                    this.y + 12,
                    this.facing
                );
                projectiles.push(proj);
                this.shootCooldown = 18;
                sound.playSound('shoot');
                emitParticles(this.x + (this.facing === 1 ? this.w : 0), this.y + 12, 8, {
                    color: '#ff8800',
                    radius: 3,
                    speed: 3,
                    life: 15,
                    gravity: 0.02,
                    vx: this.facing * 2,
                    vy: -1,
                    type: 'spark'
                });
                return true;
            }

            die() {
                if (this.invincible || this.invincibleFrames > 0) return;
                this.alive = false;
                lives--;
                sound.playSound('die');
                emitParticles(this.x + this.w / 2, this.y + this.h / 2, 30, {
                    color: '#ff3333',
                    radius: 5,
                    speed: 4,
                    life: 30,
                    gravity: 0.05,
                    vy: -2,
                    type: 'circle'
                });
                updateUI();
                if (lives <= 0) {
                    statusSpan.textContent = '💀 GAME OVER';
                    gameOver = true;
                    sound.playSound('gameOver');
                } else {
                    statusSpan.textContent = '💔 Perdeu uma vida';
                    setTimeout(() => {
                        if (checkpointX >= 0) {
                            this.x = checkpointX;
                            this.y = checkpointY;
                            this.vy = 0;
                            this.vx = 0;
                            this.alive = true;
                            this.invincibleFrames = 90;
                            statusSpan.textContent = '▶ Jogando';
                            updateUI();
                        } else {
                            this.respawn();
                        }
                    }, 500);
                }
            }

            respawn() {
                this.x = 60;
                this.y = GROUND_Y - 40;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.alive = true;
                this.invincibleFrames = 90;
                statusSpan.textContent = '▶ Jogando';
                updateUI();
            }

            draw(ctx, offsetX) {
                if (!this.alive) return;
                const sx = this.x - offsetX;
                const sy = this.y;

                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetY = 4;
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.ellipse(sx + this.w / 2, sy + this.h + 2, this.w / 2 + 4, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                if (this.invincible) {
                    const glow = ctx.createRadialGradient(sx + this.w / 2, sy + this.h / 2, 2, sx + this.w / 2, sy + this.h /
                        2, 40);
                    glow.addColorStop(0, 'rgba(255,215,0,0.25)');
                    glow.addColorStop(1, 'rgba(255,215,0,0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(sx + this.w / 2, sy + this.h / 2, 40, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (this.hasCape && !this.invincible) {
                    ctx.shadowColor = 'rgba(200,0,0,0.3)';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(sx + (this.facing === 1 ? this.w : -10), sy + 4);
                    ctx.quadraticCurveTo(sx + (this.facing === 1 ? this.w + 20 : -20), sy + 16, sx + (this.facing === 1 ?
                        this.w + 4 : -6), sy + 28);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                const bodyColor = (this.invincible) ? '#f1c40f' : '#e74c3c';
                const overallColor = (this.invincible) ? '#ffffff' : '#2c3e7a';
                const skinColor = (this.invincible) ? '#f5f5f5' : '#fdbcb4';
                const hatColor = (this.invincible) ? '#2c3e50' : '#c0392b';

                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 3;

                ctx.fillStyle = overallColor;
                ctx.fillRect(sx + 4, sy + 16, 20, 16);
                const gradBody = ctx.createLinearGradient(sx, sy + 8, sx, sy + 20);
                gradBody.addColorStop(0, bodyColor);
                gradBody.addColorStop(1, '#c0392b');
                ctx.fillStyle = gradBody;
                ctx.fillRect(sx + 2, sy + 8, 24, 12);
                ctx.fillStyle = skinColor;
                ctx.fillRect(sx - 2, sy + 12, 6, 8);
                ctx.fillRect(sx + 24, sy + 12, 6, 8);
                ctx.fillStyle = skinColor;
                ctx.fillRect(sx + 4, sy - 2, 20, 14);
                ctx.fillStyle = hatColor;
                ctx.fillRect(sx + 2, sy - 6, 24, 8);
                ctx.fillRect(sx + 4, sy - 10, 20, 6);
                ctx.fillStyle = '#1a1a2e';
                if (this.facing === 1) {
                    ctx.fillRect(sx + 18, sy + 1, 4, 4);
                    ctx.fillRect(sx + 10, sy + 1, 4, 4);
                } else {
                    ctx.fillRect(sx + 6, sy + 1, 4, 4);
                    ctx.fillRect(sx + 14, sy + 1, 4, 4);
                }
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(sx + 6, sy + 8, 16, 3);
                ctx.fillStyle = '#f1c40f';
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(sx + 10, sy + 18, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(sx + 16, sy + 18, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(sx + 0, sy + 32, 8, 5);
                ctx.fillRect(sx + 20, sy + 32, 8, 5);

                if (this.hasPower && !this.invincible) {
                    const glow = ctx.createRadialGradient(sx + (this.facing === 1 ? 30 : -6), sy + 14, 2, sx + (this
                        .facing === 1 ? 30 : -6), sy + 14, 12);
                    glow.addColorStop(0, 'rgba(255,150,0,0.8)');
                    glow.addColorStop(1, 'rgba(255,50,0,0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(sx + (this.facing === 1 ? 30 : -6), sy + 14, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff6b00';
                    ctx.shadowColor = 'rgba(255,100,0,0.6)';
                    ctx.shadowBlur = 16;
                    ctx.beginPath();
                    ctx.arc(sx + (this.facing === 1 ? 30 : -6), sy + 14, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.arc(sx + (this.facing === 1 ? 30 : -6), sy + 14, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            }
        }

        // ================================================================
        //  CLASSE ENEMY (com suporte a slime, firebat, lavamonster)
        // ================================================================
        class Enemy {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type || 'standard';
                this.w = 30;
                this.h = 32;
                this.vx = -1.2;
                this.alive = true;
                this.squished = false;
                this.squishTimer = 0;
                this.animFrame = 0;
                this.animTimer = 0;
                this.plantTimer = 0;
                this.birdY = y;
                this.birdPhase = Math.random() * Math.PI * 2;
                this.mushroomJump = 0;
                this.bearCharge = 0;
                this.ghostPhase = Math.random() * Math.PI * 2;
                this.ghostFlicker = 0;
                this.firePhase = Math.random() * Math.PI * 2;
                this.bearSpeed = 1.8;
                this.bearTimer = 0;
                this.mushroomPhase = Math.random() * Math.PI * 2;
                this.knightShield = true;
                this.knightTimer = 0;
                this.ogreSize = 1.2;
                this.ogreSlam = 0;
                this.wizardTimer = 0;
                this.wizardShootCooldown = 0;
                // Slime specific
                this.slimeJump = 0;
                this.slimePhase = Math.random() * Math.PI * 2;
                // Firebat specific
                this.firebatShootCooldown = 0;
                // Lavamonster specific
                this.lavaTimer = 0;
                this.lavaSize = 1.4;
            }

            hasGroundAt(x, y) {
                for (const seg of groundSegments) {
                    if (x > seg.x && x < seg.x + seg.w &&
                        y >= seg.y && y < seg.y + seg.h + 5) {
                        return true;
                    }
                }
                for (const plat of platforms) {
                    if (x > plat.x && x < plat.x + plat.w &&
                        y >= plat.y && y < plat.y + plat.h + 5) {
                        return true;
                    }
                }
                for (const mplat of movingPlatforms) {
                    if (x > mplat.x && x < mplat.x + mplat.w &&
                        y >= mplat.y && y < mplat.y + mplat.h + 5) {
                        return true;
                    }
                }
                return false;
            }

            update() {
                if (!this.alive) {
                    if (this.squished) { this.squishTimer--; if (this.squishTimer <= 0) return false; }
                    return true;
                }
                if (this.firebatShootCooldown > 0) this.firebatShootCooldown--;
                if (this.wizardShootCooldown > 0) this.wizardShootCooldown--;

                switch (this.type) {
                    case 'standard':
                        return this.updateStandard();
                    case 'slime':
                        return this.updateSlime();
                    case 'firebat':
                        return this.updateFirebat();
                    case 'lavamonster':
                        return this.updateLavaMonster();
                    default:
                        return this.updateStandard();
                }
            }

            updateStandard() {
                const checkX = this.x + (this.vx > 0 ? this.w + 2 : -2);
                const checkY = this.y + this.h + 2;
                if (!this.hasGroundAt(checkX, checkY)) this.vx *= -1;
                this.x += this.vx;
                let onGround = false;
                for (const seg of groundSegments) {
                    if (this.x + this.w > seg.x + 4 && this.x < seg.x + seg.w - 4) {
                        if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 8) {
                            onGround = true;
                            this.y = seg.y - this.h;
                            break;
                        }
                    }
                }
                if (!onGround) {
                    for (const plat of platforms) {
                        if (this.x + this.w > plat.x + 4 && this.x < plat.x + plat.w - 4) {
                            if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 8) {
                                onGround = true;
                                this.y = plat.y - this.h;
                                break;
                            }
                        }
                    }
                }
                if (!onGround) this.y += 2;
                if (this.x < 0) this.x = 0;
                if (this.x + this.w > LEVEL_WIDTH) this.x = LEVEL_WIDTH - this.w;
                if (this.y > H + 50) return false;
                this.animTimer++;
                if (this.animTimer > 8) { this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 2; }
                return true;
            }

            updateSlime() {
                // Slime: salta e se move lentamente
                this.slimePhase += 0.04;
                const jumpHeight = Math.sin(this.slimePhase) * 20;
                this.y = this.birdY + jumpHeight;
                this.x += this.vx * 0.4;
                if (this.x < 0 || this.x + this.w > LEVEL_WIDTH) this.vx *= -1;
                this.animTimer++;
                if (this.animTimer > 6) { this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 2; }
                return true;
            }

            updateFirebat() {
                // Firebat: voa e atira fogo
                this.birdPhase += 0.05;
                this.x += this.vx * 0.7;
                this.y = this.birdY + Math.sin(this.birdPhase) * 25 + Math.sin(this.birdPhase * 0.5) * 10;
                if (this.x < 0 || this.x + this.w > LEVEL_WIDTH) this.vx *= -1;
                this.animTimer++;
                if (this.animTimer > 4) { this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 4; }

                // Atirar fogo
                if (this.firebatShootCooldown <= 0 && Math.abs(this.x - player.x) < 400) {
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    const speed = 2.5;
                    const ep = new EnemyProjectile(
                        this.x + this.w / 2,
                        this.y + 10,
                        (dx / dist) * speed,
                        (dy / dist) * speed,
                        '#ff4400'
                    );
                    enemyProjectiles.push(ep);
                    this.firebatShootCooldown = 50;
                    sound.playSound('fire');
                    emitParticles(this.x + this.w / 2, this.y + 10, 5, {
                        color: '#ff6600',
                        radius: 3,
                        speed: 2,
                        life: 15,
                        gravity: 0.02,
                        vy: -1,
                        type: 'fire'
                    });
                }
                return true;
            }

            updateLavaMonster() {
                // Lava Monster: grande, lento, solta lava
                this.lavaTimer++;
                const checkX = this.x + (this.vx > 0 ? this.w + 8 : -8);
                const checkY = this.y + this.h + 4;
                if (!this.hasGroundAt(checkX, checkY) || this.x < 0 || this.x + this.w > LEVEL_WIDTH) {
                    this.vx *= -1;
                }
                this.x += this.vx * 0.3;
                let onGround = false;
                for (const seg of groundSegments) {
                    if (this.x + this.w > seg.x + 6 && this.x < seg.x + seg.w - 6) {
                        if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 8) {
                            onGround = true;
                            this.y = seg.y - this.h;
                            break;
                        }
                    }
                }
                if (!onGround) {
                    for (const plat of platforms) {
                        if (this.x + this.w > plat.x + 6 && this.x < plat.x + plat.w - 6) {
                            if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 8) {
                                onGround = true;
                                this.y = plat.y - this.h;
                                break;
                            }
                        }
                    }
                }
                if (!onGround) this.y += 3;
                if (this.y > H + 50) return false;

                // Soltar lava ocasionalmente
                if (this.lavaTimer % 90 === 0 && Math.abs(this.x - player.x) < 500) {
                    const ep = new EnemyProjectile(
                        this.x + this.w / 2,
                        this.y + 10,
                        (Math.random() - 0.5) * 2,
                        2 + Math.random() * 1,
                        '#ff4400'
                    );
                    enemyProjectiles.push(ep);
                    sound.playSound('lava');
                    emitParticles(this.x + this.w / 2, this.y, 10, {
                        color: '#ff4400',
                        radius: 4,
                        speed: 2,
                        life: 20,
                        gravity: 0.05,
                        vy: -1,
                        type: 'lava'
                    });
                }
                this.animTimer++;
                if (this.animTimer > 10) { this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 2; }
                return true;
            }

            squish() {
                this.alive = false;
                this.squished = true;
                this.squishTimer = 20;
                this.h = 12;
                this.y += 20;
                const bonus = this.type === 'lavamonster' ? 400 : this.type === 'firebat' ? 250 : this.type === 'slime' ?
                    150 : 100;
                score += bonus;
                sound.playSound('squish');
                const color = this.type === 'lavamonster' ? '#ff4400' : this.type === 'firebat' ? '#ff6622' : this.type ===
                    'slime' ? '#ff8833' : '#ffaa00';
                emitParticles(this.x + this.w / 2, this.y + this.h / 2, 25, {
                    color: color,
                    radius: 5,
                    speed: 5,
                    life: 30,
                    gravity: 0.03,
                    vy: -1.5,
                    type: 'fire'
                });
                updateUI();
            }

            draw(ctx, offsetX) {
                if (!this.alive && !this.squished) return;
                const sx = this.x - offsetX;
                const sy = this.y;

                if (this.squished) {
                    ctx.fillStyle = '#4a2a1a';
                    ctx.fillRect(sx, sy + 10, this.w, 12);
                    ctx.fillStyle = '#2a1a0a';
                    ctx.fillRect(sx + 4, sy + 14, 4, 4);
                    ctx.fillRect(sx + 22, sy + 14, 4, 4);
                    return;
                }

                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 3;

                if (this.type === 'slime') {
                    // Slime de magma
                    const squish = Math.sin(this.slimePhase) * 0.3 + 0.7;
                    ctx.fillStyle = '#ff6633';
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.ellipse(sx + 15, sy + 16 * squish, 14, 14 * squish, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff8844';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.ellipse(sx + 15, sy + 12 * squish, 8, 6 * squish, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Olhos
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(sx + 8, sy + 10 * squish, 6, 6);
                    ctx.fillRect(sx + 18, sy + 10 * squish, 6, 6);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(sx + 10, sy + 12 * squish, 3, 3);
                    ctx.fillRect(sx + 20, sy + 12 * squish, 3, 3);
                    ctx.shadowBlur = 0;
                } else if (this.type === 'firebat') {
                    // Morcego de fogo
                    const wing = Math.sin(this.birdPhase) * 0.5 + 0.5;
                    ctx.fillStyle = '#ff4422';
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 25;
                    ctx.beginPath();
                    ctx.ellipse(sx + 15, sy + 14, 12, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff6622';
                    ctx.fillRect(sx + 4, sy + 6 + (1 - wing) * 6, 10, 4);
                    ctx.fillRect(sx + 16, sy + 6 + (1 - wing) * 6, 10, 4);
                    ctx.fillRect(sx + 4, sy + 18 - (1 - wing) * 6, 10, 4);
                    ctx.fillRect(sx + 16, sy + 18 - (1 - wing) * 6, 10, 4);
                    // Olhos de fogo
                    ctx.fillStyle = '#ffdd44';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ffdd44';
                    ctx.fillRect(sx + 8, sy + 10, 4, 4);
                    ctx.fillRect(sx + 18, sy + 10, 4, 4);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(sx + 10, sy + 12, 2, 2);
                    ctx.fillRect(sx + 20, sy + 12, 2, 2);
                    // Chamas nas asas
                    if (this.firebatShootCooldown < 20) {
                        ctx.fillStyle = 'rgba(255,100,0,0.3)';
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#ff4400';
                        for (let i = 0; i < 3; i++) {
                            ctx.beginPath();
                            ctx.arc(sx + 2 + i * 12, sy + 24, 4 + Math.random() * 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    ctx.shadowBlur = 0;
                } else if (this.type === 'lavamonster') {
                    // Monstro de lava (grande)
                    const s = 1.4;
                    ctx.fillStyle = '#ff3311';
                    ctx.shadowColor = '#ff2200';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.ellipse(sx + 15 * s, sy + 16 * s, 14 * s, 16 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Manchas de lava
                    ctx.fillStyle = '#ff6633';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.ellipse(sx + 6 * s, sy + 10 * s, 6 * s, 4 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(sx + 20 * s, sy + 12 * s, 8 * s, 5 * s, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Olhos
                    ctx.fillStyle = '#ffdd44';
                    ctx.shadowColor = '#ffdd44';
                    ctx.shadowBlur = 20;
                    ctx.fillRect(sx + 6 * s, sy + 8 * s, 6 * s, 6 * s);
                    ctx.fillRect(sx + 18 * s, sy + 8 * s, 6 * s, 6 * s);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(sx + 8 * s, sy + 10 * s, 3 * s, 3 * s);
                    ctx.fillRect(sx + 20 * s, sy + 10 * s, 3 * s, 3 * s);
                    // Chamas na cabeça
                    ctx.fillStyle = 'rgba(255,100,0,0.3)';
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#ff4400';
                    for (let i = 0; i < 5; i++) {
                        const angle = i * 0.8 + this.lavaTimer * 0.02;
                        const px = sx + 15 * s + Math.cos(angle) * 12 * s;
                        const py = sy + 4 * s + Math.sin(angle) * 6 * s;
                        ctx.beginPath();
                        ctx.arc(px, py, 4 * s + Math.sin(this.lavaTimer * 0.05 + i) * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0;
                } else {
                    // Padrão
                    const grad = ctx.createRadialGradient(sx + 8, sy + 8, 4, sx + 15, sy + 16, 22);
                    grad.addColorStop(0, '#a67c6b');
                    grad.addColorStop(1, '#6d4c41');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.ellipse(sx + 15, sy + 16, 14, 16, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#5d4037';
                    ctx.beginPath();
                    ctx.ellipse(sx + 15, sy + 8, 12, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(sx + 6, sy + 6, 8, 8);
                    ctx.fillRect(sx + 16, sy + 6, 8, 8);
                    ctx.fillStyle = '#1a1a2e';
                    const eyeOff = this.vx > 0 ? 3 : 0;
                    ctx.fillRect(sx + 8 + eyeOff, sy + 8, 4, 5);
                    ctx.fillRect(sx + 18 + eyeOff, sy + 8, 4, 5);
                    ctx.fillStyle = '#3e2723';
                    ctx.fillRect(sx + 4, sy + 4, 10, 2);
                    ctx.fillRect(sx + 16, sy + 4, 10, 2);
                    ctx.fillRect(sx + 8, sy + 20, 14, 3);
                    ctx.fillRect(sx + 6, sy + 20, 3, 4);
                    ctx.fillRect(sx + 21, sy + 20, 3, 4);
                    ctx.fillStyle = '#4e342e';
                    ctx.fillRect(sx + 2, sy + 30, 8, 4);
                    ctx.fillRect(sx + 20, sy + 30, 8, 4);
                }
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            }
        }

        // ================================================================
        //  CLASSE ENEMY PROJECTILE (com cores)
        // ================================================================
        class EnemyProjectile {
            constructor(x, y, vx, vy, color = '#aa44ff') {
                this.x = x;
                this.y = y;
                this.w = 10;
                this.h = 10;
                this.vx = vx;
                this.vy = vy;
                this.alive = true;
                this.life = 100;
                this.trail = [];
                this.color = color;
            }
            update() {
                if (!this.alive) return false;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.04;
                this.life--;
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 6) this.trail.shift();
                for (const seg of groundSegments) {
                    if (this.x + this.w > seg.x && this.x < seg.x + seg.w) {
                        if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 6) {
                            this.alive = false;
                            emitParticles(this.x, this.y, 8, {
                                color: this.color,
                                radius: 3,
                                speed: 2,
                                life: 15,
                                gravity: 0.02,
                                vy: -1,
                                type: 'fire'
                            });
                            return false;
                        }
                    }
                }
                for (const plat of platforms) {
                    if (this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                        if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 6) {
                            this.alive = false;
                            return false;
                        }
                    }
                }
                if (this.x < -20 || this.x > LEVEL_WIDTH + 20 || this.y > H + 20 || this.life <= 0) {
                    this.alive = false;
                    return false;
                }
                return true;
            }
            draw(ctx, offsetX) {
                if (!this.alive) return;
                const sx = this.x - offsetX;
                const sy = this.y;
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length * 0.5;
                    ctx.fillStyle = this.color + Math.floor(alpha * 80).toString(16).padStart(2, '0');
                    const r = 2 + (i / this.trail.length) * 3;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x - offsetX, this.trail[i].y, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(sx + 5, sy + 5, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(sx + 5, sy + 5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ================================================================
        //  CLASSES POWERUP E PROJECTILE
        // ================================================================
        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.w = 24;
                this.h = 28;
                this.type = type || 'fire';
                this.vy = -2;
                this.onGround = false;
                this.bobPhase = Math.random() * Math.PI * 2;
            }
            update() {
                this.vy += 0.2;
                this.y += this.vy;
                for (const seg of groundSegments) {
                    if (this.x + this.w > seg.x + 4 && this.x < seg.x + seg.w - 4) {
                        if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 8) {
                            this.y = seg.y - this.h;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                }
                for (const plat of platforms) {
                    if (this.x + this.w > plat.x + 4 && this.x < plat.x + plat.w - 4) {
                        if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 8) {
                            this.y = plat.y - this.h;
                            this.vy = 0;
                            this.onGround = true;
                        }
                    }
                }
                if (this.y > H + 50) return false;
                if (this.onGround) {
                    this.bobPhase += 0.04;
                    this.y += Math.sin(this.bobPhase) * 0.15;
                }
                return true;
            }
            draw(ctx, offsetX) {
                const sx = this.x - offsetX;
                const sy = this.y;
                const glow = ctx.createRadialGradient(sx + 12, sy + 14, 2, sx + 12, sy + 14, 25);
                glow.addColorStop(0, 'rgba(255,200,50,0.3)');
                glow.addColorStop(1, 'rgba(255,200,50,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(sx + 12, sy + 14, 25, 0, Math.PI * 2);
                ctx.fill();

                if (this.type === 'fire') {
                    const grad = ctx.createRadialGradient(sx + 12, sy + 12, 2, sx + 12, sy + 14, 16);
                    grad.addColorStop(0, '#ff6b00');
                    grad.addColorStop(0.5, '#ff3300');
                    grad.addColorStop(1, '#cc2200');
                    ctx.fillStyle = grad;
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(sx + 12, sy + 14, 12, 0, Math.PI * 2);
                    ctx.fill();
                    const colors = ['#ff4400', '#ff8800', '#ff6600', '#ff2200', '#ff9900', '#ff5500'];
                    for (let i = 0; i < 6; i++) {
                        const angle = i * (Math.PI / 3) + this.bobPhase * 0.2;
                        const px = sx + 12 + Math.cos(angle) * 10;
                        const py = sy + 14 + Math.sin(angle) * 10;
                        ctx.fillStyle = colors[i % colors.length];
                        ctx.beginPath();
                        ctx.arc(px, py, 6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#ffdd44';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(sx + 12, sy + 14, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚡', sx + 12, sy + 8);
                } else if (this.type === 'cape') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.shadowColor = 'rgba(200,0,0,0.5)';
                    ctx.shadowBlur = 25;
                    ctx.beginPath();
                    ctx.moveTo(sx + 4, sy + 4);
                    ctx.quadraticCurveTo(sx + 12, sy - 8, sx + 20, sy + 4);
                    ctx.quadraticCurveTo(sx + 24, sy + 14, sx + 12, sy + 24);
                    ctx.quadraticCurveTo(sx + 0, sy + 14, sx + 4, sy + 4);
                    ctx.fill();
                    ctx.fillStyle = '#c0392b';
                    ctx.shadowBlur = 0;
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🦅', sx + 12, sy + 12);
                } else if (this.type === 'star') {
                    ctx.shadowColor = 'rgba(255,215,0,0.8)';
                    ctx.shadowBlur = 35;
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = -Math.PI / 2 + (i * Math.PI * 2 / 5);
                        const outer = 12;
                        const inner = 5;
                        const px = sx + 12 + Math.cos(angle) * outer;
                        const py = sy + 14 + Math.sin(angle) * outer;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                        const angle2 = angle + Math.PI / 5;
                        const px2 = sx + 12 + Math.cos(angle2) * inner;
                        const py2 = sy + 14 + Math.sin(angle2) * inner;
                        ctx.lineTo(px2, py2);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⭐', sx + 12, sy + 15);
                }
                ctx.shadowBlur = 0;
            }
        }

        class Projectile {
            constructor(x, y, dir) {
                this.x = x;
                this.y = y;
                this.w = 12;
                this.h = 10;
                this.dir = dir;
                this.vx = 6 * dir;
                this.vy = -0.3;
                this.alive = true;
                this.life = 80;
                this.trail = [];
            }
            update() {
                if (!this.alive) return false;
                this.x += this.vx;
                this.vy += 0.04;
                this.y += this.vy;
                this.life--;
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 8) this.trail.shift();
                for (const seg of groundSegments) {
                    if (this.x + this.w > seg.x && this.x < seg.x + seg.w) {
                        if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 6) {
                            this.alive = false;
                            return false;
                        }
                    }
                }
                for (const plat of platforms) {
                    if (this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                        if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 6) {
                            this.alive = false;
                            return false;
                        }
                    }
                }
                if (this.x < 0 || this.x > LEVEL_WIDTH || this.y > H + 20 || this.life <= 0) {
                    this.alive = false;
                    return false;
                }
                return true;
            }
            draw(ctx, offsetX) {
                if (!this.alive) return;
                const sx = this.x - offsetX;
                const sy = this.y;
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = i / this.trail.length * 0.6;
                    ctx.fillStyle = `rgba(255, 150, 0, ${alpha})`;
                    const r = 3 + (i / this.trail.length) * 4;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff8800';
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x - offsetX, this.trail[i].y, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff4400';
                const grad = ctx.createRadialGradient(sx + 2, sy + 2, 2, sx + 6, sy + 5, 10);
                grad.addColorStop(0, '#fffbe6');
                grad.addColorStop(0.2, '#ffdd44');
                grad.addColorStop(0.6, '#ff6600');
                grad.addColorStop(1, '#cc2200');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(sx + 6, sy + 5, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ================================================================
        //  FUNÇÕES DO JOGO
        // ================================================================
        function enterPipe(pipe) {
            if (enteringPipe) return;
            enteringPipe = true;
            sound.playSound('pipe');
            statusSpan.textContent = '🎁 Entrando no cano...';
            setTimeout(() => {
                statusSpan.textContent = '▶ Jogando';

        function loadGame() {
            console.log('🌋 Carregando fase Vulcão Ardente...');
            coins = coinsData.map(c => ({ ...c }));
            checkpoints = checkpointsData.map(c => ({ ...c, active: false }));

            projectiles = [];
            enemyProjectiles = [];
            particles = [];

            checkpointY = -1;

        function updateUI() {
            scoreSpan.textContent = score;
            livesSpan.textContent = lives;
            powerSpan.textContent = player && player.hasPower ? '🔥 SIM' : '❌';
            capeBadge.innerHTML = '<span class="icon">🦅</span> ' + (player && player.hasCape ? 'SIM' : '❌');
            starBadge.innerHTML = '<span class="icon">✨</span> ' + (player && player.invincible ? (player.invincibleTimer /
                60).toFixed(1) + 's' : '❌');

            else if (gameOver || lives <= 0) statusSpan.textContent = '💀 GAME OVER';
            else if (levelComplete) statusSpan.textContent = '⭐ Fase concluída!';
