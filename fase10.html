            } else if (this.type === 'bird') {
                const wingAngle = Math.sin(this.birdPhase) * 0.5;
                ctx.fillStyle = '#3498db';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.ellipse(sx + 15, sy + 12, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2980b9';
                ctx.fillRect(sx + 2, sy + 6 + wingAngle * 4, 10, 4);
                ctx.fillRect(sx + 18, sy + 6 + wingAngle * 4, 10, 4);
                ctx.fillRect(sx + 2, sy + 18 - wingAngle * 4, 10, 4);
                ctx.fillRect(sx + 18, sy + 18 - wingAngle * 4, 10, 4);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.fillRect(sx + 8, sy + 8, 6, 6);
                ctx.fillRect(sx + 16, sy + 8, 6, 6);
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(sx + 10, sy + 10, 3, 3);
                ctx.fillRect(sx + 18, sy + 10, 3, 3);
                ctx.fillStyle = '#e67e22';
                ctx.beginPath();
                ctx.moveTo(sx + (this.vx > 0 ? 28 : -2), sy + 12);
                ctx.lineTo(sx + (this.vx > 0 ? 34 : -8), sy + 14);
                ctx.lineTo(sx + (this.vx > 0 ? 28 : -2), sy + 16);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else if (this.type === 'wizard') {
                ctx.fillStyle = '#4a2a6a';
                ctx.shadowBlur = 10;
                ctx.fillRect(sx + 4, sy + 10, 22, 20);
                ctx.fillStyle = '#6a3a8a';
                ctx.fillRect(sx + 2, sy + 6, 26, 8);
                ctx.fillStyle = '#3a1a5a';
                ctx.fillRect(sx + 4, sy - 2, 22, 12);
                ctx.fillRect(sx, sy + 2, 6, 6);
                ctx.fillRect(sx + 24, sy + 2, 6, 6);
                const glow = this.wizardShootCooldown > 30;
                ctx.fillStyle = glow ? '#ffdd44' : '#aaddff';
                ctx.shadowColor = glow ? '#ffdd44' : '#aaddff';
                ctx.shadowBlur = 15;
                ctx.fillRect(sx + 8, sy + 4, 6, 4);
                ctx.fillRect(sx + 18, sy + 4, 6, 4);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#6a4a2a';
                ctx.fillRect(sx + (this.vx > 0 ? 28 : -4), sy + 4, 4, 24);
                ctx.fillStyle = '#ffdd44';
                ctx.shadowColor = '#ffdd44';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(sx + (this.vx > 0 ? 30 : -2), sy + 2, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else if (this.type === 'firebat') {
                const wing = Math.sin(this.birdPhase) * 0.5 + 0.5;
                ctx.fillStyle = '#ff4422';
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.ellipse(sx + 15, sy + 14, 12, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff6622';
                ctx.fillRect(sx + 4, sy + 6 + (1 - wing) * 6, 10, 4);
                ctx.fillRect(sx + 16, sy + 6 + (1 - wing) * 6, 10, 4);
                ctx.fillRect(sx + 4, sy + 18 - (1 - wing) * 6, 10, 4);
                ctx.fillRect(sx + 16, sy + 18 - (1 - wing) * 6, 10, 4);
                ctx.fillStyle = '#ffdd44';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffdd44';
                ctx.fillRect(sx + 8, sy + 10, 4, 4);
                ctx.fillRect(sx + 18, sy + 10, 4, 4);
                ctx.fillStyle = '#1a1a2e';
                ctx.shadowBlur = 0;
                ctx.fillRect(sx + 10, sy + 12, 2, 2);
                ctx.fillRect(sx + 20, sy + 12, 2, 2);
                if (this.firebatShootCooldown < 20) {
                    ctx.fillStyle = 'rgba(255,100,0,0.3)';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff4400';
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.arc(sx + 2 + i * 12, sy + 24, 4 + Math.random() * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.shadowBlur = 0;
            } else if (this.type === 'drone') {
                ctx.fillStyle = '#44aaff';
                ctx.shadowColor = '#44aaff';
                ctx.shadowBlur = 15;
                ctx.fillRect(sx + 4, sy + 6, 22, 16);
                ctx.fillStyle = '#66ccff';
                ctx.fillRect(sx + 2, sy + 4, 26, 6);
                const wingAngle = Math.sin(this.birdPhase) * 0.3;
                ctx.fillStyle = '#88ddff';
                ctx.shadowBlur = 8;
                ctx.fillRect(sx - 10 + wingAngle * 5, sy + 8, 12, 4);
                ctx.fillRect(sx + 28 - wingAngle * 5, sy + 8, 12, 4);
                ctx.fillStyle = '#ff4466';
                ctx.shadowColor = '#ff4466';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(sx + 15, sy + 12, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(sx + 15, sy + 12, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else if (this.type === 'turret') {
                ctx.fillStyle = '#2a3a5a';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 8;
                ctx.fillRect(sx + 4, sy + 16, 22, 16);
                ctx.fillStyle = '#3a5a7a';
                ctx.fillRect(sx + 8, sy + 8, 14, 12);
                const dir = this.x < player.x ? 1 : -1;
                ctx.fillStyle = '#4a6a8a';
                ctx.fillRect(sx + 10 + dir * 6, sy + 10, 10 + dir * 6, 6);
                if (this.turretTimer % 60 < 10 && Math.abs(this.x - player.x) < 500) {
                    ctx.fillStyle = 'rgba(255, 50, 100, 0.3)';
                    ctx.shadowColor = '#ff3366';
                    ctx.shadowBlur = 30;
                    const laserLen = Math.min(200, Math.abs(this.x - player.x));
                    ctx.fillRect(sx + (dir > 0 ? 20 : -laserLen), sy + 12, laserLen, 4);
                    ctx.shadowBlur = 0;
                }
                ctx.fillStyle = '#ff3366';
                ctx.shadowColor = '#ff3366';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(sx + 15, sy + 12, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                const grad = ctx.createRadialGradient(sx + 8, sy + 8, 4, sx + 15, sy + 16, 22);
                grad.addColorStop(0, '#a67c6b');
                grad.addColorStop(1, '#6d4c41');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(sx + 15, sy + 16, 14, 16, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#5d4037';
                ctx.beginPath();
                ctx.ellipse(sx + 15, sy + 8, 12, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.fillRect(sx + 6, sy + 6, 8, 8);
                ctx.fillRect(sx + 16, sy + 6, 8, 8);
                ctx.fillStyle = '#1a1a2e';
                const eyeOff = this.vx > 0 ? 3 : 0;
                ctx.fillRect(sx + 8 + eyeOff, sy + 8, 4, 5);
                ctx.fillRect(sx + 18 + eyeOff, sy + 8, 4, 5);
                ctx.fillStyle = '#3e2723';
                ctx.fillRect(sx + 4, sy + 4, 10, 2);
                ctx.fillRect(sx + 16, sy + 4, 10, 2);
                ctx.fillRect(sx + 8, sy + 20, 14, 3);
                ctx.fillRect(sx + 6, sy + 20, 3, 4);
                ctx.fillRect(sx + 21, sy + 20, 3, 4);
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(sx + 2, sy + 30, 8, 4);
                ctx.fillRect(sx + 20, sy + 30, 8, 4);
            }
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
        }
    }

    // ================================================================
    //  CLASSE ENEMY PROJECTILE
    // ================================================================
    class EnemyProjectile {
        constructor(x, y, vx, vy, color = '#ff4466') {
            this.x = x; this.y = y; this.w = 10; this.h = 10;
            this.vx = vx; this.vy = vy;
            this.alive = true; this.life = 80;
            this.trail = [];
            this.color = color;
        }
        update() {
            if (!this.alive) return false;
            this.x += this.vx;
            this.y += this.vy;
            this.life--;
            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 6) this.trail.shift();
            for (const seg of groundSegments) {
                if (this.x + this.w > seg.x && this.x < seg.x + seg.w) {
                    if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 6) {
                        this.alive = false;
                        emitParticles(this.x, this.y, 8, {
                            color: this.color, radius: 3, speed: 2, life: 15, gravity: 0.01, vy: -1, type: 'glow'
                        });
                        return false;
                    }
                }
            }
            for (const plat of platforms) {
                if (this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                    if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 6) {
                        this.alive = false; return false;
                    }
                }
            }
            if (this.x < -20 || this.x > LEVEL_WIDTH + 20 || this.y > H + 20 || this.life <= 0) {
                this.alive = false; return false;
            }
            return true;
        }
        draw(ctx, offsetX) {
            if (!this.alive) return;
            const sx = this.x - offsetX, sy = this.y;
            for (let i = 0; i < this.trail.length; i++) {
                const alpha = i / this.trail.length * 0.5;
                ctx.fillStyle = this.color + Math.floor(alpha * 80).toString(16).padStart(2, '0');
                const r = 2 + (i / this.trail.length) * 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.trail[i].x - offsetX, this.trail[i].y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 20;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(sx + 5, sy + 5, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(sx + 5, sy + 5, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // ================================================================
    //  CLASSES POWERUP E PROJECTILE (idênticas)
    // ================================================================
    class PowerUp {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.w = 24; this.h = 28;
            this.type = type || 'fire';
            this.vy = -2; this.onGround = false;
            this.bobPhase = Math.random() * Math.PI * 2;
        }
        update() {
            this.vy += 0.2;
            this.y += this.vy;
            for (const seg of groundSegments) {
                if (this.x + this.w > seg.x + 4 && this.x < seg.x + seg.w - 4) {
                    if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 8) {
                        this.y = seg.y - this.h; this.vy = 0; this.onGround = true;
                    }
                }
            }
            for (const plat of platforms) {
                if (this.x + this.w > plat.x + 4 && this.x < plat.x + plat.w - 4) {
                    if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 8) {
                        this.y = plat.y - this.h; this.vy = 0; this.onGround = true;
                    }
                }
            }
            if (this.y > H + 50) return false;
            if (this.onGround) {
                this.bobPhase += 0.04;
                this.y += Math.sin(this.bobPhase) * 0.15;
            }
            return true;
        }
        draw(ctx, offsetX) {
            const sx = this.x - offsetX, sy = this.y;
            const glow = ctx.createRadialGradient(sx + 12, sy + 14, 2, sx + 12, sy + 14, 25);
            glow.addColorStop(0, 'rgba(255,200,50,0.3)');
            glow.addColorStop(1, 'rgba(255,200,50,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(sx + 12, sy + 14, 25, 0, Math.PI * 2);
            ctx.fill();

            if (this.type === 'fire') {
                const grad = ctx.createRadialGradient(sx + 12, sy + 12, 2, sx + 12, sy + 14, 16);
                grad.addColorStop(0, '#ff6b00');
                grad.addColorStop(0.5, '#ff3300');
                grad.addColorStop(1, '#cc2200');
                ctx.fillStyle = grad;
                ctx.shadowColor = '#ff6600';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(sx + 12, sy + 14, 12, 0, Math.PI * 2);
                ctx.fill();
                const colors = ['#ff4400','#ff8800','#ff6600','#ff2200','#ff9900','#ff5500'];
                for (let i = 0; i < 6; i++) {
                    const angle = i * (Math.PI/3) + this.bobPhase * 0.2;
                    const px = sx + 12 + Math.cos(angle) * 10;
                    const py = sy + 14 + Math.sin(angle) * 10;
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.beginPath();
                    ctx.arc(px, py, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#ffdd44';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(sx + 12, sy + 14, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('⚡', sx + 12, sy + 8);
            } else if (this.type === 'cape') {
                ctx.fillStyle = '#e74c3c';
                ctx.shadowColor = 'rgba(200,0,0,0.5)';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.moveTo(sx + 4, sy + 4);
                ctx.quadraticCurveTo(sx + 12, sy - 8, sx + 20, sy + 4);
                ctx.quadraticCurveTo(sx + 24, sy + 14, sx + 12, sy + 24);
                ctx.quadraticCurveTo(sx + 0, sy + 14, sx + 4, sy + 4);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#c0392b';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🦅', sx + 12, sy + 12);
            } else if (this.type === 'star') {
                ctx.shadowColor = 'rgba(255,215,0,0.8)';
                ctx.shadowBlur = 35;
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = -Math.PI/2 + (i * Math.PI * 2 / 5);
                    const outer = 12, inner = 5;
                    const px = sx + 12 + Math.cos(angle) * outer;
                    const py = sy + 14 + Math.sin(angle) * outer;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                    const angle2 = angle + Math.PI/5;
                    const px2 = sx + 12 + Math.cos(angle2) * inner;
                    const py2 = sy + 14 + Math.sin(angle2) * inner;
                    ctx.lineTo(px2, py2);
                }
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffdd44';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⭐', sx + 12, sy + 15);
            }
            ctx.shadowBlur = 0;
        }
    }

    class Projectile {
        constructor(x, y, dir) {
            this.x = x; this.y = y; this.w = 12; this.h = 10;
            this.dir = dir; this.vx = 6 * dir; this.vy = -0.3;
            this.alive = true; this.life = 80;
            this.trail = [];
        }
        update() {
            if (!this.alive) return false;
            this.x += this.vx;
            this.vy += 0.04;
            this.y += this.vy;
            this.life--;
            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 8) this.trail.shift();
            for (const seg of groundSegments) {
                if (this.x + this.w > seg.x && this.x < seg.x + seg.w) {
                    if (this.y + this.h > seg.y && this.y + this.h < seg.y + seg.h + 6) {
                        this.alive = false; return false;
                    }
                }
            }
            for (const plat of platforms) {
                if (this.x + this.w > plat.x && this.x < plat.x + plat.w) {
                    if (this.y + this.h > plat.y && this.y + this.h < plat.y + plat.h + 6) {
                        this.alive = false; return false;
                    }
                }
            }
            if (this.x < 0 || this.x > LEVEL_WIDTH || this.y > H + 20 || this.life <= 0) {
                this.alive = false; return false;
            }
            return true;
        }
        draw(ctx, offsetX) {
            if (!this.alive) return;
            const sx = this.x - offsetX, sy = this.y;
            for (let i = 0; i < this.trail.length; i++) {
                const alpha = i / this.trail.length * 0.6;
                ctx.fillStyle = `rgba(255, 150, 0, ${alpha})`;
                const r = 3 + (i / this.trail.length) * 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff8800';
                ctx.beginPath();
                ctx.arc(this.trail[i].x - offsetX, this.trail[i].y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff4400';
            const grad = ctx.createRadialGradient(sx + 2, sy + 2, 2, sx + 6, sy + 5, 10);
            grad.addColorStop(0, '#fffbe6');
            grad.addColorStop(0.2, '#ffdd44');
            grad.addColorStop(0.6, '#ff6600');
            grad.addColorStop(1, '#cc2200');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(sx + 6, sy + 5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function enterPipe(pipe) {

        enteringPipe = true;

        statusSpan.textContent = '🎁 Entrando no cano...';
        setTimeout(() => {

        projectiles = [];
        enemyProjectiles = [];
        particles = [];

        checkpointY = -1;

    function updateUI() {
        scoreSpan.textContent = score;
        livesSpan.textContent = lives;
        powerSpan.textContent = player && player.hasPower ? '🔥 SIM' : '❌';
        capeBadge.innerHTML = '<span class="icon">🦅</span> ' + (player && player.hasCape ? 'SIM' : '❌');
        starBadge.innerHTML = '<span class="icon">✨</span> ' + (player && player.invincible ? (player.invincibleTimer/60).toFixed(1)+'s' : '❌');

        if (gameWon) statusSpan.textContent = '👑 VITÓRIA!';
        else if (gameOver || lives <= 0) statusSpan.textContent = '💀 GAME OVER';
        else if (levelComplete) statusSpan.textContent = '⭐ Fase concluída!';
        else if (paused) statusSpan.textContent = '⏸️ Pausado';

    // ================================================================
    //  CONTROLES E EVENTOS
    // ================================================================
    document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
        if (e.key === 'r' || e.key === 'R') loadGame();
        if (!sound.initialized) sound.init();
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function togglePause() {
        paused = !paused;
        if (paused) {
            statusSpan.textContent = '⏸️ Pausado';
            sound.stopMusic();
        } else {
            if (sound.enabled) sound.playMusic();
            statusSpan.textContent = '▶ Jogando';
        }
        updateUI();
    }

    function setupVirtualControls() {
        function setVirtKey(key, value) {
            if (key === 'ArrowLeft') virtKeys.left = value;
            else if (key === 'ArrowRight') virtKeys.right = value;
            else if (key === 'ArrowUp') virtKeys.up = value;
            else if (key === 'ArrowDown') virtKeys.down = value;
            else if (key === 'a') virtKeys.jump = value;
            else if (key === 'b') virtKeys.shoot = value;
        }

        const buttons = document.querySelectorAll('[data-key]');
        buttons.forEach(btn => {
            const key = btn.dataset.key;
            if (!key) return;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                btn.classList.add('active');
                setVirtKey(key, true);
                if (!sound.initialized) sound.init();
                const touch = e.changedTouches[0];
                showTouchFeedback(touch.clientX, touch.clientY);
            }, { passive: false });

            btn.addEventListener('touchmove', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const touch = e.changedTouches[0];
                const rect = btn.getBoundingClientRect();
                const inside = touch.clientX >= rect.left && touch.clientX <= rect.right &&
                               touch.clientY >= rect.top && touch.clientY <= rect.bottom;
                if (!inside) {
                    btn.classList.remove('active');
                    setVirtKey(key, false);
                } else {
                    btn.classList.add('active');
                    setVirtKey(key, true);
                }
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                e.stopPropagation();
                btn.classList.remove('active');
                setVirtKey(key, false);
            }, { passive: false });

            btn.addEventListener('touchcancel', (e) => {
                btn.classList.remove('active');
                setVirtKey(key, false);
            }, { passive: false });

            btn.addEventListener('mousedown', (e) => {
                btn.classList.add('active');
                setVirtKey(key, true);
                if (!sound.initialized) sound.init();
                showTouchFeedback(e.clientX, e.clientY);
            });
            btn.addEventListener('mouseup', (e) => {
                btn.classList.remove('active');
                setVirtKey(key, false);
            });
            btn.addEventListener('mouseleave', (e) => {
                btn.classList.remove('active');
                setVirtKey(key, false);
            });
        });

        function setupTopButton(id, action) {
            const el = document.getElementById(id);
            if (!el) return;
            let touchHandled = false;
            const handler = (e) => {
                e.preventDefault();
                action(e);
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 150);
            };
            el.addEventListener('touchstart', (e) => {
                touchHandled = true;
                handler(e);
            }, { passive: false });
            el.addEventListener('click', (e) => {
                if (touchHandled) {
                    touchHandled = false;
                    return;
                }
                handler(e);
            });
            el.addEventListener('touchcancel', () => {
                el.classList.remove('active');
            });
        }

        setupTopButton('restartBtn', () => {
            loadGame();
            if (navigator.vibrate) navigator.vibrate(20);
        });
        setupTopButton('backBtn', () => {
            window.location.href = 'index.html';
        });
        setupTopButton('pauseBtn', () => {
            togglePause();
            if (navigator.vibrate) navigator.vibrate(10);
        });
        setupTopButton('soundBtn', () => {
            if (!sound.initialized) sound.init();
            const enabled = sound.toggleSound();
            document.getElementById('soundBtn').textContent = enabled ? '🔊' : '🔇';
            if (navigator.vibrate) navigator.vibrate(10);
        });

        document.getElementById('controlsOverlay').addEventListener('touchstart', (e) => {
            if (e.target.closest('.dpad-btn') || e.target.closest('.btn-action') ||
                e.target.closest('.btn-restart') || e.target.closest('.btn-sound') ||
                e.target.closest('.btn-back') || e.target.closest('.btn-pause')) {
                e.preventDefault();
            }
        }, { passive: false });

        document.getElementById('startOverlay').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('startOverlay').style.display = 'none';
            if (!sound.initialized) sound.init();
            if (sound.enabled) sound.playMusic();
        }, { passive: false });
        document.getElementById('startOverlay').addEventListener('touchstart', (e) => {
            e.preventDefault();
            document.getElementById('startOverlay').style.display = 'none';
            if (!sound.initialized) sound.init();
            if (sound.enabled) sound.playMusic();
        }, { passive: false });
    }

    function showTouchFeedback(clientX, clientY) {
        const wrapper = document.getElementById('gameWrapper');
        const rect = wrapper.getBoundingClientRect();
        const el = document.createElement('div');
        el.className = 'touch-feedback';
        el.style.left = (clientX - rect.left - 15) + 'px';
        el.style.top = (clientY - rect.top - 15) + 'px';
        el.style.width = '30px';
        el.style.height = '30px';
        wrapper.appendChild(el);
        setTimeout(() => el.remove(), 300);
    }

    // ================================================================
    //  COLISÕES E ATUALIZAÇÕES
    // ================================================================
    function handleEnemyCollisions() {
        for (const enemy of enemies) {
            if (!enemy.alive || enemy.squished || !player.alive) continue;
            const px = player.x, py = player.y;
            const ex = enemy.x, ey = enemy.y;
            const ew = enemy.type === 'boss' ? enemy.w * 1.8 : enemy.type === 'turret' ? enemy.w + 10 : enemy.w;
            const eh = enemy.type === 'boss' ? enemy.h * 1.8 : enemy.type === 'turret' ? enemy.h + 10 : enemy.h;
            if (px + player.w > ex + 4 && px < ex + ew - 4 &&
                py + player.h > ey + 4 && py < ey + eh - 4) {
                if (player.invincible) {
                    enemy.squish();
                    player.vy = -4;
                    score += 150;
                    updateUI();
                    continue;
                }
                if (player.vy > 0 && py + player.h - ey < 20) {
                    enemy.squish();
                    player.vy = -6;
                    score += 100;
                    updateUI();
                } else {
                    if (player.invincibleFrames === 0) {
                        player.die();
                    }
                }
            }
        }
    }

    function handleProjectileCollisions() {
        for (const proj of projectiles) {
            if (!proj.alive) continue;
            for (const enemy of enemies) {
                if (!enemy.alive || enemy.squished) continue;
                const ew = enemy.type === 'boss' ? enemy.w * 1.8 : enemy.type === 'turret' ? enemy.w + 10 : enemy.w;
                const eh = enemy.type === 'boss' ? enemy.h * 1.8 : enemy.type === 'turret' ? enemy.h + 10 : enemy.h;
                if (proj.x + proj.w > enemy.x && proj.x < enemy.x + ew &&
                    proj.y + proj.h > enemy.y && proj.y < enemy.y + eh) {
                    if (enemy.type === 'boss') {
                        enemy.bossHealth--;
                        proj.alive = false;
                        emitParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, 10, {
                            color: '#ff0044', radius: 4, speed: 3, life: 20, gravity: 0.02, vy: -1, type: 'glow'
                        });
                        if (enemy.bossHealth <= 0) {
                            enemy.squish();
                            score += 1000;
                            updateUI();
                        }
                        continue;
                    }
                    enemy.squish();
                    proj.alive = false;
                    score += 150;
                    updateUI();
                    emitParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, 20, {
                        color: '#ff8800', radius: 4, speed: 4, life: 25, gravity: 0.03, vy: -1.5, type: 'spark'
                    });
                    break;
                }
            }
        }
    }

    function updateCamera(targetX) {
        const halfW = W / 2;
        let target = targetX - halfW;
        target = Math.max(0, Math.min(target, LEVEL_WIDTH - W));
        camera.x += (target - camera.x) * 0.1;
    }

    // ================================================================
    //  DESENHO DO CENÁRIO (Castelo Final - cores SNES)
    // ================================================================
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, COLORS.skyTop);
        grad.addColorStop(0.5, '#1a0a2a');
        grad.addColorStop(1, COLORS.skyBottom);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Castelo ao fundo
        const castleX = 2000 - camera.x * 0.03;
        ctx.fillStyle = 'rgba(30, 20, 40, 0.3)';
        ctx.fillRect(castleX + 80, 60, 80, 200);
        ctx.fillRect(castleX + 100, 40, 40, 30);
        ctx.fillRect(castleX, 100, 50, 160);
        ctx.fillRect(castleX + 50, 80, 20, 20);
        ctx.fillRect(castleX + 170, 100, 50, 160);
        ctx.fillRect(castleX + 170, 80, 20, 20);
        for (let i = 0; i < 80; i += 12) {
            ctx.fillRect(castleX + 80 + i, 60, 6, 10);
        }
        ctx.fillStyle = 'rgba(200, 50, 50, 0.2)';
        ctx.fillRect(castleX + 118, 30, 4, 30);
        ctx.beginPath();
        ctx.moveTo(castleX + 122, 30);
        ctx.lineTo(castleX + 142, 38);
        ctx.lineTo(castleX + 122, 46);
        ctx.fill();

        // Estrelas
        for (let i = 0; i < 40; i++) {
            const x = (i * 97 + 13 + camera.x * 0.01) % W;
            const y = (i * 53 + 7) % (H * 0.4);
            const alpha = 0.3 + Math.sin(i * 1.7 + frameCount * 0.002) * 0.2;
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(x, y, 0.5 + Math.sin(i) * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // Lua vermelha
        ctx.fillStyle = 'rgba(200, 50, 50, 0.15)';
        ctx.shadowColor = 'rgba(200, 50, 50, 0.1)';
        ctx.shadowBlur = 50;
        ctx.beginPath();
        ctx.arc(750, 70, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function drawGround() {
        for (const seg of groundSegments) {
            const sx = seg.x - camera.x;
            if (sx + seg.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = COLORS.groundTop;
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillRect(sx, seg.y, seg.w, 6);
            ctx.shadowBlur = 0;
            const grad = ctx.createLinearGradient(0, seg.y + 6, 0, seg.y + seg.h);
            grad.addColorStop(0, COLORS.groundBody1);
            grad.addColorStop(1, COLORS.groundBody2);
            ctx.fillStyle = grad;
            ctx.fillRect(sx, seg.y + 6, seg.w, seg.h - 6);
            ctx.fillStyle = 'rgba(60,40,30,0.2)';
            for (let i = 0; i < seg.w; i += 30) {
                ctx.fillRect(sx + i + Math.sin(i * 0.5 + seg.x) * 4, seg.y + 8 + Math.sin(i * 0.3) * 4, 14, 8);
                ctx.fillRect(sx + i + 15 + Math.sin(i * 0.7 + seg.x) * 4, seg.y + 18 + Math.sin(i * 0.4) * 4, 12, 6);
            }
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(sx, seg.y + seg.h - 3, seg.w, 3);
        }
        ctx.shadowBlur = 0;
    }

    function drawPlatformsAndBlocks() {
        for (const plat of platforms) {
            const sx = plat.x - camera.x;
            if (sx + plat.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = COLORS.platform;
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillRect(sx, plat.y, plat.w, plat.h);
            ctx.fillStyle = COLORS.platformDark;
            ctx.fillRect(sx, plat.y + plat.h - 4, plat.w, 4);
            ctx.fillStyle = '#4a3a2a';
            ctx.fillRect(sx, plat.y, plat.w, 3);
            for (let i = 0; i < plat.w; i += 20) {
                ctx.fillStyle = '#1a0a0a';
                ctx.fillRect(sx + i, plat.y + 4, 1, plat.h - 8);
            }
            ctx.shadowBlur = 0;
        }
        for (const mplat of movingPlatforms) {
            const sx = mplat.x - camera.x;
            if (sx + mplat.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = COLORS.platform;
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillRect(sx, mplat.y, mplat.w, mplat.h);
            ctx.fillStyle = COLORS.platformDark;
            ctx.fillRect(sx, mplat.y + mplat.h - 4, mplat.w, 4);
            ctx.fillStyle = '#4a3a2a';
            ctx.fillRect(sx, mplat.y, mplat.w, 3);
            for (let i = 0; i < mplat.w; i += 20) {
                ctx.fillStyle = '#1a0a0a';
                ctx.fillRect(sx + i, mplat.y + 4, 1, mplat.h - 8);
            }
            ctx.shadowBlur = 0;
        }
        for (const block of questionBlocks) {
            const sx = block.x - camera.x;
            if (sx + block.w < -20 || sx > W + 20) continue;
            if (block.used) {
                ctx.fillStyle = COLORS.blockUsed;
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.fillRect(sx, block.y, block.w, block.h);
                ctx.fillStyle = '#1a0a0a';
                ctx.fillRect(sx + 2, block.y + 2, block.w - 4, block.h - 4);
                ctx.shadowBlur = 0;
                continue;
            }
            const grad = ctx.createLinearGradient(sx, block.y, sx, block.y + block.h);
            grad.addColorStop(0, COLORS.blockQuestion);
            grad.addColorStop(1, COLORS.blockQuestionDark);
            ctx.fillStyle = grad;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255,215,0,0.3)';
            ctx.fillRect(sx, block.y, block.w, block.h);
            ctx.fillStyle = '#fbc02d';
            ctx.fillRect(sx + 3, block.y + 3, block.w - 6, block.h - 6);
            ctx.fillStyle = '#f57f17';
            ctx.fillRect(sx, block.y, block.w, 2);
            ctx.fillRect(sx, block.y, 2, block.h);
            ctx.fillRect(sx + block.w - 2, block.y, 2, block.h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('?', sx + block.w/2, block.y + block.h/2 + 1);
        }
        ctx.shadowBlur = 0;
    }

    function drawPipes(offsetX) {
        for (const pipe of pipes) {
            const sx = pipe.x - offsetX;
            if (sx + pipe.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = COLORS.pipeBody;
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillRect(sx + 4, pipe.y, pipe.w - 8, pipe.h);
            ctx.fillStyle = COLORS.pipeLight;
            ctx.fillRect(sx, pipe.y - 6, pipe.w, 8);
            ctx.fillStyle = COLORS.pipeDark;
            ctx.fillRect(sx + 2, pipe.y - 4, pipe.w - 4, 4);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(sx + 2, pipe.y + 4, 4, pipe.h - 8);
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(sx + 6, pipe.y + 8, 4, pipe.h - 16);
            if (pipe.type === 'entry') {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('▼', sx + pipe.w/2, pipe.y - 10);
            }
            ctx.shadowBlur = 0;
        }
    }

    function drawCoins(offsetX) {
        for (const coin of coins) {
            const sx = coin.x - offsetX;
            const sy = coin.y + Math.sin(frameCount * 0.06 + coin.x) * 2;
            ctx.shadowColor = 'rgba(255, 215, 0, 0.4)';
            ctx.shadowBlur = 12;
            ctx.fillStyle = COLORS.coin;
            ctx.beginPath();
            ctx.arc(sx + coin.w/2, sy + coin.h/2, coin.w/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = COLORS.coinShine;
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', sx + coin.w/2, sy + coin.h/2 + 1);
            ctx.shadowBlur = 0;
        }
    }

    function drawSpikesAndCheckpoints() {
        for (const spike of spikes) {
            const sx = spike.x - camera.x, sy = spike.y;
            if (sx + spike.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = '#6a5a4a';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(80,60,40,0.3)';
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + spike.w/2, sy - spike.h);
            ctx.lineTo(sx + spike.w, sy);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#8a7a6a';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(sx + 2, sy - 2);
            ctx.lineTo(sx + spike.w/2, sy - spike.h + 2);
            ctx.lineTo(sx + spike.w - 2, sy - 2);
            ctx.closePath();
            ctx.fill();
        }
        ctx.shadowBlur = 0;
        for (const cp of checkpoints) {
            const sx = cp.x - camera.x, sy = cp.y;
            if (sx + cp.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = cp.active ? COLORS.checkpointActive : COLORS.checkpointInactive;
            ctx.shadowColor = cp.active ? 'rgba(46,204,113,0.6)' : 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(sx + cp.w/2, sy + cp.h/2, cp.w/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚑', sx + cp.w/2, sy + cp.h/2 + 1);
        }
        ctx.shadowBlur = 0;
    }

    function drawFlag() {
        const fx = FLAG_X - camera.x, fy = FLAG_Y;
        if (fx < -40 || fx > W + 40) return;
        ctx.fillStyle = COLORS.flagPole;
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.fillRect(fx + 10, fy, 6, 90);
        ctx.fillStyle = '#8d6e63';
        ctx.fillRect(fx + 12, fy, 2, 90);
        ctx.fillStyle = COLORS.flag;
        ctx.shadowColor = 'rgba(241,196,15,0.5)';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(fx + 13, fy - 4, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        const wave = Math.sin(frameCount * 0.04) * 3;
        if (gameWon) {
            ctx.shadowColor = 'rgba(255,215,0,0.8)';
            ctx.shadowBlur = 40;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.fillStyle = '#ffd700';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 30;
            ctx.fillText('👑', fx + 28 + wave * 0.5, fy + 20);
        } else if (!levelComplete) {
            ctx.fillStyle = '#ecf0f1';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            ctx.shadowColor = 'rgba(255,255,255,0.6)';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.fillStyle = COLORS.flag;
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 20;
            ctx.fillText('★', fx + 28 + wave * 0.5, fy + 20);
        }
        ctx.shadowBlur = 0;
    }

    // ================================================================
    //  LOOP PRINCIPAL
    // ================================================================
    function gameLoop() {
        if (!paused) {
            frameCount++;

            for (const mplat of movingPlatforms) {
                mplat.x += mplat.speed * mplat.dir;
                if (mplat.x >= mplat.xMax || mplat.x <= mplat.xMin) mplat.dir *= -1;
                mplat.vx = mplat.speed * mplat.dir;
            }

            if (levelComplete && nextLevelTimer > 0) {
                nextLevelTimer--;
                if (nextLevelTimer === 0) {
                    window.location.href = 'index.html';
                }
            }

            if (!gameWon && !gameOver && lives > 0 && !levelComplete) {
                if ((keys['z'] || keys['Z'] || keys['x'] || keys['X'] || virtKeys.shoot) && player.alive && !enteringPipe) {
                    player.shoot();
                }
                player.update();
                if (player.alive) updateCamera(player.x);

                enemies = enemies.filter(e => e.update());
                powerUps = powerUps.filter(pu => pu.update());
                projectiles = projectiles.filter(p => p.update());
                enemyProjectiles = enemyProjectiles.filter(ep => ep.update());
                particles = particles.filter(p => p.update());

                handleEnemyCollisions();
                handleProjectileCollisions();

                if (!player.alive && lives <= 0) {
                    gameOver = true;
                    statusSpan.textContent = '💀 GAME OVER';
                    sound.playSound('gameOver');
                }
                updateUI();
            }

            if (bossDefeated && !levelComplete && player && player.x + player.w > FLAG_X) {
                // pode prosseguir
            }
        }

        ctx.clearRect(0, 0, W, H);
        drawBackground();
        drawGround();
        drawPlatformsAndBlocks();
        drawPipes(camera.x);
        drawCoins(camera.x);
        drawSpikesAndCheckpoints();

        for (const pu of powerUps) pu.draw(ctx, camera.x);
        for (const enemy of enemies) enemy.draw(ctx, camera.x);
        for (const ep of enemyProjectiles) ep.draw(ctx, camera.x);
        for (const proj of projectiles) proj.draw(ctx, camera.x);
        if (player) player.draw(ctx, camera.x);
        drawFlag();

        for (const p of particles) {
            p.draw(ctx, camera.x);
        }

        if (gameWon) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 56px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255,215,0,0.6)';
            ctx.shadowBlur = 40;
            ctx.fillText('👑 VITÓRIA!', W/2, H/2 - 30);
            ctx.font = '28px Arial';
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.fillText('Parabéns! Você completou todas as fases!', W/2, H/2 + 50);
            ctx.shadowBlur = 0;
        } else if (gameOver || lives <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 52px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('💀 GAME OVER', W/2, H/2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText('Reinicie ou volte ao mapa', W/2, H/2 + 60);
            ctx.shadowBlur = 0;
        } else if (levelComplete && nextLevelTimer > 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.fillText('⭐ Fase concluída!', W/2, H/2 - 10);
            ctx.font = '22px Arial';
            ctx.fillText('Voltando ao mapa...', W/2, H/2 + 50);
            ctx.shadowBlur = 0;
        } else if (paused) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('⏸️ PAUSADO', W/2, H/2);
            ctx.shadowBlur = 0;
        } else if (bossDefeated && !levelComplete) {
            ctx.fillStyle = 'rgba(255,215,0,0.15)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd700';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.shadowColor = 'rgba(255,215,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.fillText('⚔️ BOSS DERROTADO - Pegue a bandeira!', W/2, H - 20);
            ctx.shadowBlur = 0;
        }

        const progress = Math.min(1, (player ? player.x : 0) / (LEVEL_WIDTH - 100));
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.roundRect(W - 170, 12, 150, 10, 6);
        ctx.fill();
        const grad = ctx.createLinearGradient(W - 170, 12, W - 20, 12);
        grad.addColorStop(0, '#ffd700');
        grad.addColorStop(1, '#ff0044');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(W - 170, 12, Math.max(4, progress * 150), 10, 6);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('CASTELO FINAL', W - 95, 12);

        requestAnimationFrame(gameLoop);
    }

    // ================================================================
    //  INICIALIZAÇÃO
    // ================================================================
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    }

    document.addEventListener('click', () => { if (!sound.initialized) sound.init(); }, { once: true });
    document.addEventListener('touchstart', () => { if (!sound.initialized) sound.init(); }, { once: true });

    document.getElementById('soundBtn').textContent = '🔊';

    loadGame();
    setupVirtualControls();
    gameLoop();

    console.log('👑 Fase 10 - Castelo Final com música nativa SNES e batalha épica!');
    console.log('⚔️ Derrote o Boss e complete a jornada!');
</script>
