            ctx.fillRect(sx, pipe.y - 6, pipe.w, 8);
            ctx.fillStyle = '#1b5e20';
            ctx.fillRect(sx + 2, pipe.y - 4, pipe.w - 4, 4);
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(sx + 2, pipe.y + 4, 4, pipe.h - 8);
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(sx + 6, pipe.y + 8, 4, pipe.h - 16);
            if (pipe.type === 'entry') {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('▼', sx + pipe.w/2, pipe.y - 10);
            }
            ctx.shadowBlur = 0;
        }
    }

    function drawCoins(offsetX) {
        for (const coin of coins) {
            const sx = coin.x - offsetX;
            const sy = coin.y + Math.sin(frameCount * 0.06 + coin.x) * 2;
            ctx.shadowColor = 'rgba(255, 215, 0, 0.4)';
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(sx + coin.w/2, sy + coin.h/2, coin.w/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa00';
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', sx + coin.w/2, sy + coin.h/2 + 1);
            ctx.shadowBlur = 0;
        }
    }

    function drawSpikesAndCheckpoints() {
        for (const spike of spikes) {
            const sx = spike.x - camera.x, sy = spike.y;
            if (sx + spike.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = '#c0392b';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(192,57,43,0.4)';
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + spike.w/2, sy - spike.h);
            ctx.lineTo(sx + spike.w, sy);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#e74c3c';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(sx + 2, sy - 2);
            ctx.lineTo(sx + spike.w/2, sy - spike.h + 2);
            ctx.lineTo(sx + spike.w - 2, sy - 2);
            ctx.closePath();
            ctx.fill();
        }
        ctx.shadowBlur = 0;
        for (const cp of checkpoints) {
            const sx = cp.x - camera.x, sy = cp.y;
            if (sx + cp.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = cp.active ? '#2ecc71' : '#95a5a6';
            ctx.shadowColor = cp.active ? 'rgba(46,204,113,0.6)' : 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(sx + cp.w/2, sy + cp.h/2, cp.w/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚑', sx + cp.w/2, sy + cp.h/2 + 1);
        }
        ctx.shadowBlur = 0;
    }

    function drawFlag() {
        const fx = FLAG_X - camera.x, fy = FLAG_Y;
        if (fx < -40 || fx > W + 40) return;
        ctx.fillStyle = '#5d4037';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.fillRect(fx + 10, fy, 6, 90);
        ctx.fillStyle = '#8d6e63';
        ctx.fillRect(fx + 12, fy, 2, 90);
        ctx.fillStyle = '#f1c40f';
        ctx.shadowColor = 'rgba(241,196,15,0.5)';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(fx + 13, fy - 4, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        const wave = Math.sin(frameCount * 0.04) * 3;
        if (!levelComplete && !gameWon) {
            ctx.fillStyle = '#ecf0f1';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            ctx.shadowColor = 'rgba(255,255,255,0.6)';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 20;
            ctx.fillText('★', fx + 28 + wave * 0.5, fy + 20);
        }
        ctx.shadowBlur = 0;
    }

    // Função para desenhar retângulo arredondado (fallback)
    function roundRect(ctx, x, y, w, h, r) {
        if (typeof ctx.roundRect === 'function') {
            ctx.roundRect(x, y, w, h, r);
            return;
        }
        // Fallback manual
        if (r > w/2) r = w/2;
        if (r > h/2) r = h/2;
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
    }

    // ================================================================
    //  LOOP PRINCIPAL
    // ================================================================
    function gameLoop() {
        if (!paused) {
            frameCount++;

            for (const mplat of movingPlatforms) {
                mplat.x += mplat.speed * mplat.dir;
                if (mplat.x >= mplat.xMax || mplat.x <= mplat.xMin) mplat.dir *= -1;
                mplat.vx = mplat.speed * mplat.dir;
            }

            if (levelComplete && nextLevelTimer > 0) {
                nextLevelTimer--;
                if (nextLevelTimer === 0) {
                    window.location.href = 'index.html';
                }
            }

            if (!gameWon && !gameOver && lives > 0 && !levelComplete) {
                if ((keys['z'] || keys['Z'] || keys['x'] || keys['X'] || virtKeys.shoot) && player && player.alive && !enteringPipe) {
                    player.shoot();
                }
                if (player) player.update();
                if (player && player.alive) updateCamera(player.x);

                enemies = enemies.filter(e => e.update());
                powerUps = powerUps.filter(pu => pu.update());
                projectiles = projectiles.filter(p => p.update());
                particles = particles.filter(p => p.update());

                handleEnemyCollisions();
                handleProjectileCollisions();

                if (player && !player.alive && lives <= 0) {
                    gameOver = true;
                    statusSpan.textContent = '💀 GAME OVER';
                    sound.playSound('gameOver');
                }
                updateUI();
            }
        }

        ctx.clearRect(0, 0, W, H);
        drawBackground();
        drawGround();
        drawPlatformsAndBlocks();
        drawPipes(camera.x);
        drawCoins(camera.x);
        drawSpikesAndCheckpoints();

        for (const pu of powerUps) pu.draw(ctx, camera.x);
        for (const enemy of enemies) enemy.draw(ctx, camera.x);
        for (const proj of projectiles) proj.draw(ctx, camera.x);
        if (player) player.draw(ctx, camera.x);
        drawFlag();

        for (const p of particles) {
            p.draw(ctx, camera.x);
        }

        if (gameWon) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 52px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('🏆 VITÓRIA!', W/2, H/2 - 20);
            ctx.font = '24px Arial';
            ctx.fillText('Parabéns!', W/2, H/2 + 50);
            ctx.shadowBlur = 0;
        } else if (gameOver || lives <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 52px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('💀 GAME OVER', W/2, H/2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText('Reinicie ou volte ao mapa', W/2, H/2 + 60);
            ctx.shadowBlur = 0;
        } else if (levelComplete && nextLevelTimer > 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.fillText('⭐ Fase concluída!', W/2, H/2 - 10);
            ctx.font = '22px Arial';
            ctx.fillText('Voltando ao mapa...', W/2, H/2 + 50);
            ctx.shadowBlur = 0;
        } else if (paused) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('⏸️ PAUSADO', W/2, H/2);
            ctx.shadowBlur = 0;
        }

        // Barra de progresso
        const progress = Math.min(1, (player ? player.x : 0) / (LEVEL_WIDTH - 100));
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        roundRect(ctx, W - 170, 12, 150, 10, 6);
        ctx.fill();
        ctx.fillStyle = '#4caf50';
        ctx.beginPath();
        roundRect(ctx, W - 170, 12, Math.max(4, progress * 150), 10, 6);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('PROGRESSO', W - 95, 12);

        requestAnimationFrame(gameLoop);
    }

    // ================================================================
    //  INICIALIZAÇÃO
    // ================================================================
    document.getElementById('soundBtn').textContent = '🔊';

    loadGame();
    setupVirtualControls();
    gameLoop();

    console.log('🌿 Fase 1 - Campo Verde com suporte a áudio personalizado e otimizada para mobile!');
</script>
