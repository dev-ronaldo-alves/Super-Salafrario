                    ctx.fillStyle = '#3e2723';
                    ctx.fillRect(sx + 2, block.y + 2, block.w - 4, block.h - 4);
                    ctx.shadowBlur = 0;
                    continue;
                }
                const grad = ctx.createLinearGradient(sx, block.y, sx, block.y + block.h);
                grad.addColorStop(0, '#f1c40f');
                grad.addColorStop(1, '#d4a017');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(241,196,15,0.25)';
                ctx.fillRect(sx, block.y, block.w, block.h);
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(sx + 3, block.y + 3, block.w - 6, block.h - 6);
                ctx.fillStyle = '#d4a017';
                ctx.fillRect(sx, block.y, block.w, 2);
                ctx.fillRect(sx, block.y, 2, block.h);
                ctx.fillRect(sx + block.w - 2, block.y, 2, block.h);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('?', sx + block.w / 2, block.y + block.h / 2 + 1);
            }
            ctx.shadowBlur = 0;
        }

        function drawPipes(offsetX) {
            for (const pipe of pipes) {
                const sx = pipe.x - offsetX;
                if (sx + pipe.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = '#2e7d32';
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.fillRect(sx + 4, pipe.y, pipe.w - 8, pipe.h);
                ctx.fillStyle = '#388e3c';
                ctx.fillRect(sx, pipe.y - 5, pipe.w, 7);
                ctx.fillStyle = '#1b5e20';
                ctx.fillRect(sx + 2, pipe.y - 3, pipe.w - 4, 3);
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(sx + 2, pipe.y + 4, 4, pipe.h - 8);
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fillRect(sx + 6, pipe.y + 8, 4, pipe.h - 16);
                if (pipe.type === 'entry') {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('▼', sx + pipe.w / 2, pipe.y - 8);
                }
                ctx.shadowBlur = 0;
            }
        }

        function drawCoins(offsetX) {
            for (const coin of coins) {
                const sx = coin.x - offsetX;
                const sy = coin.y + Math.sin(frameCount * 0.05 + coin.x) * 2;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.3)';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(sx + coin.w / 2, sy + coin.h / 2, coin.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffaa00';
                ctx.font = '7px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', sx + coin.w / 2, sy + coin.h / 2 + 1);
                ctx.shadowBlur = 0;
            }
        }

        function drawSpikesAndCheckpoints() {
            for (const spike of spikes) {
                const sx = spike.x - camera.x;
                const sy = spike.y;
                if (sx + spike.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = '#c0392b';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(192,57,43,0.3)';
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + spike.w / 2, sy - spike.h);
                ctx.lineTo(sx + spike.w, sy);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#e74c3c';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(sx + 2, sy - 2);
                ctx.lineTo(sx + spike.w / 2, sy - spike.h + 2);
                ctx.lineTo(sx + spike.w - 2, sy - 2);
                ctx.closePath();
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            for (const cp of checkpoints) {
                const sx = cp.x - camera.x;
                const sy = cp.y;
                if (sx + cp.w < -20 || sx > W + 20) continue;
                ctx.fillStyle = cp.active ? '#2ecc71' : '#95a5a6';
                ctx.shadowColor = cp.active ? 'rgba(46,204,113,0.4)' : 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(sx + cp.w / 2, sy + cp.h / 2, cp.w / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = '11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚑', sx + cp.w / 2, sy + cp.h / 2 + 1);
            }
            ctx.shadowBlur = 0;
        }

        function drawFlag() {
            const fx = FLAG_X - camera.x;
            const fy = FLAG_Y;
            if (fx < -40 || fx > W + 40) return;
            ctx.fillStyle = '#5d4037';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.fillRect(fx + 10, fy, 6, 80);
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(fx + 12, fy, 2, 80);
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = 'rgba(241,196,15,0.4)';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(fx + 13, fy - 3, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            const wave = Math.sin(frameCount * 0.04) * 3;
            if (!levelComplete && !gameWon) {
                ctx.fillStyle = '#ecf0f1';
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0,0,0,0.08)';
                ctx.beginPath();
                ctx.moveTo(fx + 16, fy + 6);
                ctx.quadraticCurveTo(fx + 38 + wave, fy + 14, fx + 16, fy + 28);
                ctx.fill();
                ctx.strokeStyle = '#bdc3c7';
                ctx.lineWidth = 1;
                ctx.stroke();
            } else {
                ctx.shadowColor = 'rgba(255,255,255,0.5)';
                ctx.shadowBlur = 25;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(fx + 16, fy + 6);
                ctx.quadraticCurveTo(fx + 38 + wave, fy + 14, fx + 16, fy + 28);
                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 15;
                ctx.fillText('★', fx + 26 + wave * 0.5, fy + 18);
            }
            ctx.shadowBlur = 0;
        }

        // ================================================================
        //  LOOP PRINCIPAL
        // ================================================================
        function gameLoop() {
            if (!paused) {
                frameCount++;

                for (const mplat of movingPlatforms) {
                    mplat.x += mplat.speed * mplat.dir;
                    if (mplat.x >= mplat.xMax || mplat.x <= mplat.xMin) mplat.dir *= -1;
                    mplat.vx = mplat.speed * mplat.dir;
                }

                if (levelComplete && nextLevelTimer > 0) {
                    nextLevelTimer--;
                    if (nextLevelTimer === 0) {
                        window.location.href = 'index.html';
                    }
                }

                if (!gameWon && !gameOver && lives > 0 && !levelComplete) {
                    if ((keys['z'] || keys['Z'] || keys['x'] || keys['X'] || virtKeys.shoot) && player.alive && !
                        enteringPipe) {
                        player.shoot();
                    }
                    player.update();
                    if (player.alive) updateCamera(player.x);

                    enemies = enemies.filter(e => e.update());
                    powerUps = powerUps.filter(pu => pu.update());
                    projectiles = projectiles.filter(p => p.update());
                    particles = particles.filter(p => p.update());

                    handleEnemyCollisions();
                    handleProjectileCollisions();

                    if (!player.alive && lives <= 0) {
                        gameOver = true;
                        statusSpan.textContent = '💀 GAME OVER';
                        sound.playSound('gameOver');
                    }
                    updateUI();
                }
            }

            ctx.clearRect(0, 0, W, H);
            drawBackground();
            drawGround();
            drawPlatformsAndBlocks();
            drawPipes(camera.x);
            drawCoins(camera.x);
            drawSpikesAndCheckpoints();

            for (const pu of powerUps) pu.draw(ctx, camera.x);
            for (const enemy of enemies) enemy.draw(ctx, camera.x);
            for (const proj of projectiles) proj.draw(ctx, camera.x);
            if (player) player.draw(ctx, camera.x);
            drawFlag();

            for (const p of particles) {
                p.draw(ctx, camera.x);
            }

            if (gameWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                ctx.fillText('🏆 VITÓRIA!', W / 2, H / 2 - 15);
                ctx.font = '22px Arial';
                ctx.fillText('Parabéns!', W / 2, H / 2 + 45);
                ctx.shadowBlur = 0;
            } else if (gameOver || lives <= 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                ctx.fillText('💀 GAME OVER', W / 2, H / 2 - 10);
                ctx.fillStyle = '#fff';
                ctx.font = '22px Arial';
                ctx.fillText('Reinicie ou volte ao mapa', W / 2, H / 2 + 55);
                ctx.shadowBlur = 0;
            } else if (levelComplete && nextLevelTimer > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 12;
                ctx.fillText('⭐ Fase concluída!', W / 2, H / 2 - 10);
                ctx.font = '20px Arial';
                ctx.fillText('Voltando ao mapa...', W / 2, H / 2 + 45);
                ctx.shadowBlur = 0;
            } else if (paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                ctx.fillText('⏸️ PAUSADO', W / 2, H / 2);
                ctx.shadowBlur = 0;
            }

            const progress = Math.min(1, (player ? player.x : 0) / (LEVEL_WIDTH - 100));
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            ctx.roundRect(W - 160, 10, 140, 8, 4);
            ctx.fill();
            ctx.fillStyle = '#4caf50';
            ctx.beginPath();
            ctx.roundRect(W - 160, 10, Math.max(4, progress * 140), 8, 4);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '7px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('PROGRESSO', W - 90, 10);

            requestAnimationFrame(gameLoop);
        }

        // ================================================================
        //  INICIALIZAÇÃO
        // ================================================================
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        document.addEventListener('click', () => { if (!sound.initialized) sound.init(); }, { once: true });
        document.addEventListener('touchstart', () => { if (!sound.initialized) sound.init(); }, { once: true });

        document.getElementById('soundBtn').addEventListener('click', () => {
            if (!sound.initialized) sound.init();
            const enabled = sound.toggleSound();
            document.getElementById('soundBtn').textContent = enabled ? '🔊 Som' : '🔇 Mudo';
        });

        loadGame();
        setupVirtualControls();
        gameLoop();

        console.log('🌿 Fase 1 - Campo Verde (otimizada) carregada!');
    </script>
</body>
