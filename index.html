<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Aventureiro - Mapa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .map-container {
            max-width: 1000px;
            width: 100%;
            background: linear-gradient(145deg, #1a1f35, #0f1425);
            border-radius: 40px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }
        .map-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7d94e, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(240, 165, 0, 0.2);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .map-subtitle {
            text-align: center;
            color: #8899bb;
            font-size: 1.1rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2f4a;
            padding-bottom: 15px;
        }
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        .level-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px 10px 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #fff;
        }
        .level-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #f0a500;
            background: rgba(240, 165, 0, 0.10);
            box-shadow: 0 12px 30px rgba(240, 165, 0, 0.15);
        }
        .level-card .icon {
            font-size: 3.2rem;
            line-height: 1;
        }
        .level-card .name {
            font-weight: 600;
            font-size: 1rem;
            color: #eef2ff;
            letter-spacing: 0.3px;
        }
        .level-card .sub {
            font-size: 0.7rem;
            color: #8899bb;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 12px;
            border-radius: 30px;
            margin-top: 4px;
        }
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.6);
            pointer-events: none;
        }
        .level-card.locked .icon {
            opacity: 0.6;
        }
        .footer-info {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #556688;
            border-top: 1px solid #1f2640;
            padding-top: 20px;
        }
        .footer-info span {
            color: #f0a500;
        }
        @media (max-width: 600px) {
            .map-title {
                font-size: 2.2rem;
            }
            .level-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
            }
            .level-card .icon {
                font-size: 2.4rem;
            }
            .level-card .name {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="map-container">
        <h1 class="map-title">🗺️ SUPER AVENTUREIRO</h1>
        <p class="map-subtitle">Escolha seu destino • 10 mundos para explorar</p>

        <div class="level-grid" id="levelGrid">
            <!-- As fases serão inseridas via JavaScript -->
        </div>

        <div class="footer-info">
            🎮 Clique em uma fase para começar • <span>poderes</span> • <span>inimigos</span> • <span>emoção</span>
        </div>
    </div>

    <script>
        // Dados das fases
        const phases = [{
            id: 1,
            name: 'Campo Verde',
            icon: '🌿',
            file: 'fase1.html',
            unlocked: true,
            desc: 'Início'
        }, {
            id: 2,
            name: 'Deserto Árido',
            icon: '🏜️',
            file: 'fase2.html',
            unlocked: true,
            desc: 'Areia e espinhos'
        }, {
            id: 3,
            name: 'Montanha Gelada',
            icon: '❄️',
            file: 'fase3.html',
            unlocked: true,
            desc: 'Gelo e pássaros'
        }, {
            id: 4,
            name: 'Caverna Escura',
            icon: '🕳️',
            file: 'fase4.html',
            unlocked: true,
            desc: 'Cogumelos'
        }, {
            id: 5,
            name: 'Floresta Densas',
            icon: '🌲',
            file: 'fase5.html',
            unlocked: true,
            desc: 'Ursos e plantas'
        }, {
            id: 6,
            name: 'Pico Rochoso',
            icon: '⛰️',
            file: 'fase6.html',
            unlocked: true,
            desc: 'Aves e espinhos'
        }, {
            id: 7,
            name: 'Castelo Medieval',
            icon: '🏰',
            file: 'fase7.html',
            unlocked: true,
            desc: 'Cogumelos e ursos'
        }, {
            id: 8,
            name: 'Vulcão Ardente',
            icon: '🌋',
            file: 'fase8.html',
            unlocked: true,
            desc: 'Fogo e plantas'
        }, {
            id: 9,
            name: 'Estação Espacial',
            icon: '🚀',
            file: 'fase9.html',
            unlocked: true,
            desc: 'Gravidade zero?'
        }, {
            id: 10,
            name: 'Castelo Final',
            icon: '👑',
            file: 'fase10.html',
            unlocked: true,
            desc: 'O desafio final'
        }];

        const grid = document.getElementById('levelGrid');

        phases.forEach(phase => {
            const card = document.createElement('a');
            card.className = 'level-card' + (phase.unlocked ? '' : ' locked');
            card.href = phase.file;
            card.innerHTML = `
                <div class="icon">${phase.icon}</div>
                <div class="name">${phase.name}</div>
                <div class="sub">${phase.desc}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
