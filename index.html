<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Salafrário - Mapa</title>
    <link rel="icon" href="./logo.png" type="image/png">
    <style>
        /* Reset e base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            touch-action: manipulation;
        }
        .map-container {
            max-width: 1100px;
            width: 100%;
            background: linear-gradient(145deg, #1a1f35, #0f1425);
            border-radius: 32px;
            padding: 20px 18px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: padding 0.2s;
        }
        .map-title {
            text-align: center;
            font-size: clamp(2rem, 10vw, 3.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f7d94e, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(240, 165, 0, 0.15);
            letter-spacing: 1px;
            margin-bottom: 4px;
            line-height: 1.2;
        }
        .map-subtitle {
            text-align: center;
            color: #8899bb;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2f4a;
            padding-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 14px;
            margin-top: 6px;
        }
        .level-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 14px 6px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #fff;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            min-height: 110px;
            justify-content: center;
        }
        .level-card:active {
            transform: scale(0.94);
            border-color: #f0a500;
            background: rgba(240, 165, 0, 0.12);
        }
        .level-card .icon {
            font-size: clamp(2.4rem, 8vw, 3.2rem);
            line-height: 1;
            pointer-events: none;
        }
        .level-card .name {
            font-weight: 600;
            font-size: clamp(0.8rem, 2.2vw, 1rem);
            color: #eef2ff;
            letter-spacing: 0.2px;
            pointer-events: none;
        }
        .level-card .sub {
            font-size: clamp(0.6rem, 1.6vw, 0.7rem);
            color: #8899bb;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 10px;
            border-radius: 30px;
            margin-top: 2px;
            pointer-events: none;
        }
        .level-card.locked {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.6);
            pointer-events: none;
        }
        .level-card.locked .icon {
            opacity: 0.6;
        }
        .footer-info {
            margin-top: 24px;
            text-align: center;
            font-size: clamp(0.7rem, 1.8vw, 0.85rem);
            color: #556688;
            border-top: 1px solid #1f2640;
            padding-top: 16px;
            letter-spacing: 0.3px;
        }
        .footer-info span {
            color: #f0a500;
        }

        /* Ajustes responsivos */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .map-container { padding: 16px 12px 20px; border-radius: 24px; }
            .level-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
            .level-card { padding: 10px 4px 8px; min-height: 90px; border-radius: 14px; }
            .level-card .icon { font-size: 2rem; }
            .level-card .name { font-size: 0.7rem; }
            .level-card .sub { font-size: 0.55rem; padding: 1px 8px; }
            .map-subtitle { font-size: 0.75rem; margin-bottom: 14px; padding-bottom: 8px; }
        }
        @media (max-width: 380px) {
            .level-grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
            .level-card { min-height: 76px; padding: 8px 2px 6px; }
            .level-card .icon { font-size: 1.6rem; }
            .level-card .name { font-size: 0.6rem; }
            .level-card .sub { font-size: 0.5rem; padding: 0 6px; }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            .map-container { padding: 12px 18px 16px; }
            .map-title { font-size: 1.8rem; margin-bottom: 0; }
            .map-subtitle { font-size: 0.75rem; margin-bottom: 10px; padding-bottom: 6px; }
            .level-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
            .level-card { min-height: 80px; padding: 8px 4px; }
            .level-card .icon { font-size: 1.8rem; }
            .footer-info { margin-top: 12px; padding-top: 10px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="map-container">
        <h1 class="map-title">🗺️ SALAFRÁRIO</h1>
        <p class="map-subtitle">Escolha seu destino • 26 mundos para explorar</p>

        <div class="level-grid" id="levelGrid"></div>

        <div class="footer-info">
            🎮 Clique em uma fase para começar • <span>poderes</span> • <span>inimigos</span> • <span>emoção</span>
        </div>
    </div>

    <script>
        // ========== 26 FASES (16 originais + 10 novas) ==========
        const phases = [
            // Fases 1 a 16 (já existentes)
            { id: 1, name: 'Campo Verde', icon: '🌿', file: 'fase1.html', unlocked: true, desc: 'Início' },
            { id: 2, name: 'Deserto Árido', icon: '🏜️', file: 'fase2.html', unlocked: true, desc: 'Areia e espinhos' },
            { id: 3, name: 'Montanha Gelada', icon: '❄️', file: 'fase3.html', unlocked: true, desc: 'Gelo e pássaros' },
            { id: 4, name: 'Caverna Escura', icon: '🕳️', file: 'fase4.html', unlocked: true, desc: 'Cogumelos' },
            { id: 5, name: 'Floresta Densa', icon: '🌲', file: 'fase5.html', unlocked: true, desc: 'Ursos e plantas' },
            { id: 6, name: 'Pico Rochoso', icon: '⛰️', file: 'fase6.html', unlocked: true, desc: 'Aves e espinhos' },
            { id: 7, name: 'Castelo Medieval', icon: '🏰', file: 'fase7.html', unlocked: true, desc: 'Cogumelos e ursos' },
            { id: 8, name: 'Vulcão Ardente', icon: '🌋', file: 'fase8.html', unlocked: true, desc: 'Fogo e plantas' },
            { id: 9, name: 'Estação Espacial', icon: '🚀', file: 'fase9.html', unlocked: true, desc: 'Gravidade zero?' },
            { id: 10, name: 'Castelo Final', icon: '👑', file: 'fase10.html', unlocked: true, desc: 'O desafio final' },
            { id: 11, name: 'Planeta Água', icon: '🌊', file: 'fase11.html', unlocked: true, desc: 'Oceanos profundos' },
            { id: 12, name: 'Céu Nublado', icon: '☁️', file: 'fase12.html', unlocked: true, desc: 'Plataformas aéreas' },
            { id: 13, name: 'Templo Antigo', icon: '🏛️', file: 'fase13.html', unlocked: true, desc: 'Armadilhas e enigmas' },
            { id: 14, name: 'Masmorra Sombria', icon: '💀', file: 'fase14.html', unlocked: true, desc: 'Esqueletos e trevas' },
            { id: 15, name: 'Estrela do Norte', icon: '⭐', file: 'fase15.html', unlocked: true, desc: 'A última fronteira' },
            { id: 16, name: 'Campo Verde II', icon: '🌿', file: 'fase16.html', unlocked: true, desc: 'Plantas e animais' },

            // ===== NOVAS FASES (17 a 26) =====
            { id: 17, name: 'Pântano Envenenado', icon: '🐊', file: 'fase17.html', unlocked: true, desc: 'Névoa e jacarés' },
            { id: 18, name: 'Cidade dos Ventos', icon: '🌬️', file: 'fase18.html', unlocked: true, desc: 'Correntes e arranha-céus' },
            { id: 19, name: 'Templo do Fogo', icon: '🔥', file: 'fase19.html', unlocked: true, desc: 'Labirinto de chamas' },
            { id: 20, name: 'Pico Congelado', icon: '🏔️', file: 'fase20.html', unlocked: true, desc: 'Tempestade de neve' },
            { id: 21, name: 'Caverna de Cristal', icon: '💎', file: 'fase21.html', unlocked: true, desc: 'Reflexos e armadilhas' },
            { id: 22, name: 'Ilha dos Dinossauros', icon: '🦕', file: 'fase22.html', unlocked: true, desc: 'Criaturas pré-históricas' },
            { id: 23, name: 'Deserto das Almas', icon: '👻', file: 'fase23.html', unlocked: true, desc: 'Fantasmas e miragens' },
            { id: 24, name: 'Castelo do Vampiro', icon: '🧛', file: 'fase24.html', unlocked: true, desc: 'Trevas e morcegos' },
            { id: 25, name: 'Núcleo da Terra', icon: '🌍', file: 'fase25.html', unlocked: true, desc: 'Magma e cristais' },
            { id: 26, name: 'Planalto das Estrelas', icon: '🌌', file: 'fase26.html', unlocked: true, desc: 'Onde tudo começou' },
        ];

        const grid = document.getElementById('levelGrid');

        phases.forEach(phase => {
            const card = document.createElement('a');
            card.className = 'level-card' + (phase.unlocked ? '' : ' locked');
            card.href = phase.file;
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', `Fase ${phase.id}: ${phase.name}`);
            card.innerHTML = `
                <div class="icon">${phase.icon}</div>
                <div class="name">${phase.name}</div>
                <div class="sub">${phase.desc}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
