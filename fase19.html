    function enterPipe(pipe) {
        if (enteringPipe) return;
        enteringPipe = true;
        sound.playSound('pipe');
        statusSpan.textContent = `🎁 Entrando no cano...`;
        setTimeout(() => {
            statusSpan.textContent = '▶ Jogando';
            enteringPipe = false;
        }, 800);
    }

    function loadGame() {
        coins = coinsData.map(c => ({ ...c }));
        checkpoints = checkpointsData.map(c => ({ ...c, active: false }));
        powerUps = [];
        projectiles = [];
        particles = [];
        checkpointX = -1;
        checkpointY = -1;

        player = new Player();
        enemies = enemyData.map(e => new Enemy(e.x, e.y, e.type || 'fireball'));

        score = 0;
        lives = 3;
        totalCoins = 0;
        gameWon = false;
        gameOver = false;
        levelComplete = false;
        paused = false;
        nextLevelTimer = 0;
        enteringPipe = false;

        camera.x = Math.max(0, Math.min(player.x - W/2, LEVEL_WIDTH - W));
        updateUI();
        if (sound.enabled && sound.initialized) sound.playMusic();
    }

    function updateUI() {
        scoreSpan.textContent = score;
        livesSpan.textContent = lives;
        powerSpan.textContent = player && player.hasFire ? '🔥 SIM' : '❌';
        iceSpan.textContent = player && player.hasIce ? '❄️ SIM' : '❌';
        superSpan.textContent = player && player.hasSuper ? '⭐ SIM' : '❌';
        capeBadge.innerHTML = '<span class="icon">🦅</span> ' + (player && player.hasCape ? 'SIM' : '❌');
        starBadge.innerHTML = '<span class="icon">✨</span> ' + (player && player.hasStar ? (player.invincibleTimer/60).toFixed(1)+'s' : '❌');
        coinCountSpan.textContent = totalCoins;
        if (gameWon) statusSpan.textContent = '🏆 VENCEU!';
        else if (gameOver || lives <= 0) statusSpan.textContent = '💀 GAME OVER';
        else if (levelComplete) statusSpan.textContent = '⭐ Fase concluída!';
        else if (paused) statusSpan.textContent = '⏸️ Pausado';
        else statusSpan.textContent = '▶ Jogando';
    }

    // ================================================================
    //  CONTROLES E EVENTOS
    // ================================================================
    document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
        if (e.key === 'r' || e.key === 'R') loadGame();
        if (!sound.initialized) sound.init();
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    function togglePause() {
        paused = !paused;
        if (paused) { statusSpan.textContent = '⏸️ Pausado'; sound.stopMusic(); }
        else { if (sound.enabled) sound.playMusic(); statusSpan.textContent = '▶ Jogando'; }
        updateUI();
    }

    function setupVirtualControls() {
        function setVirtKey(key, value) {
            if (key === 'ArrowLeft') virtKeys.left = value;
            else if (key === 'ArrowRight') virtKeys.right = value;
            else if (key === 'ArrowUp') virtKeys.up = value;
            else if (key === 'ArrowDown') virtKeys.down = value;
            else if (key === 'a') virtKeys.jump = value;
            else if (key === 'b') virtKeys.shoot = value;
        }

        const buttons = document.querySelectorAll('[data-key]');
        buttons.forEach(btn => {
            const key = btn.dataset.key;
            if (!key) return;
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); e.stopPropagation();
                btn.classList.add('active');
                setVirtKey(key, true);
                if (!sound.initialized) sound.init();
                const touch = e.changedTouches[0];
                showTouchFeedback(touch.clientX, touch.clientY);
            }, { passive: false });
            btn.addEventListener('touchmove', (e) => {
                e.preventDefault(); e.stopPropagation();
                const touch = e.changedTouches[0];
                const rect = btn.getBoundingClientRect();
                const inside = touch.clientX >= rect.left && touch.clientX <= rect.right &&
                               touch.clientY >= rect.top && touch.clientY <= rect.bottom;
                if (!inside) { btn.classList.remove('active'); setVirtKey(key, false); }
                else { btn.classList.add('active'); setVirtKey(key, true); }
            }, { passive: false });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault(); e.stopPropagation();
                btn.classList.remove('active');
                setVirtKey(key, false);
            }, { passive: false });
            btn.addEventListener('touchcancel', (e) => {
                btn.classList.remove('active');
                setVirtKey(key, false);
            }, { passive: false });
            btn.addEventListener('mousedown', (e) => {
                btn.classList.add('active');
                setVirtKey(key, true);
                if (!sound.initialized) sound.init();
                showTouchFeedback(e.clientX, e.clientY);
            });
            btn.addEventListener('mouseup', (e) => {
                btn.classList.remove('active');
                setVirtKey(key, false);
            });
            btn.addEventListener('mouseleave', (e) => {
                btn.classList.remove('active');
                setVirtKey(key, false);
            });
        });

        function setupTopButton(id, action) {
            const el = document.getElementById(id);
            if (!el) return;
            let touchHandled = false;
            const handler = (e) => { e.preventDefault(); action(e); el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 150); };
            el.addEventListener('touchstart', (e) => { touchHandled = true; handler(e); }, { passive: false });
            el.addEventListener('click', (e) => { if (touchHandled) { touchHandled = false; return; } handler(e); });
            el.addEventListener('touchcancel', () => { el.classList.remove('active'); });
        }

        setupTopButton('restartBtn', () => { loadGame(); if (navigator.vibrate) navigator.vibrate(20); });
        setupTopButton('backBtn', () => { window.location.href = 'index.html'; });
        setupTopButton('pauseBtn', () => { togglePause(); if (navigator.vibrate) navigator.vibrate(10); });
        setupTopButton('soundBtn', () => {
            if (!sound.initialized) sound.init();
            const enabled = sound.toggleSound();
            document.getElementById('soundBtn').textContent = enabled ? '🔊' : '🔇';
            if (navigator.vibrate) navigator.vibrate(10);
        });

        document.getElementById('controlsOverlay').addEventListener('touchstart', (e) => {
            if (e.target.closest('.dpad-btn') || e.target.closest('.btn-action') ||
                e.target.closest('.btn-restart') || e.target.closest('.btn-sound') ||
                e.target.closest('.btn-back') || e.target.closest('.btn-pause')) {
                e.preventDefault();
            }
        }, { passive: false });

        document.getElementById('startOverlay').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('startOverlay').style.display = 'none';
            if (!sound.initialized) sound.init();
            if (sound.enabled) sound.playMusic();
        }, { passive: false });
        document.getElementById('startOverlay').addEventListener('touchstart', (e) => {
            e.preventDefault();
            document.getElementById('startOverlay').style.display = 'none';
            if (!sound.initialized) sound.init();
            if (sound.enabled) sound.playMusic();
        }, { passive: false });
    }

    function showTouchFeedback(clientX, clientY) {
        const wrapper = document.getElementById('gameWrapper');
        const rect = wrapper.getBoundingClientRect();
        const el = document.createElement('div');
        el.className = 'touch-feedback';
        el.style.left = (clientX - rect.left - 15) + 'px';
        el.style.top = (clientY - rect.top - 15) + 'px';
        el.style.width = '30px';
        el.style.height = '30px';
        wrapper.appendChild(el);
        setTimeout(() => el.remove(), 300);
    }

    // ================================================================
    //  COLISÕES E ATUALIZAÇÕES
    // ================================================================
    function handleEnemyCollisions() {
        for (const enemy of enemies) {
            if (!enemy.alive || enemy.squished || !player.alive) continue;
            if (enemy.frozen) continue;
            const px = player.x, py = player.y;
            const ex = enemy.x, ey = enemy.y;
            if (px + player.w > ex + 4 && px < ex + enemy.w - 4 &&
                py + player.h > ey + 4 && py < ey + enemy.h - 4) {
                if (player.invincible || player.hasStar) {
                    enemy.squish();
                    player.vy = -4;
                    score += 150;
                    updateUI();
                    continue;
                }
                if (player.vy > 0 && py + player.h - ey < 20) {
                    enemy.squish();
                    player.vy = -6;
                    score += 100;
                    updateUI();
                } else {
                    if (player.invincibleFrames === 0) { player.die(); }
                }
            }
        }
    }

    function handleProjectileCollisions() {
        for (const proj of projectiles) {
            if (!proj.alive) continue;
            for (const enemy of enemies) {
                if (!enemy.alive || enemy.squished) continue;
                if (proj.x + proj.w > enemy.x && proj.x < enemy.x + enemy.w &&
                    proj.y + proj.h > enemy.y && proj.y < enemy.y + enemy.h) {
                    if (proj.type === 'ice') {
                        enemy.freeze();
                        proj.alive = false;
                        emitParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, 15, {
                            color: '#4fc3f7', radius: 4, speed: 3, life: 20, gravity: 0.02, vy: -1, type: 'ice'
                        });
                    } else {
                        enemy.squish();
                        proj.alive = false;
                        score += 150;
                        updateUI();
                        emitParticles(enemy.x + enemy.w/2, enemy.y + enemy.h/2, 20, {
                            color: '#ff8800', radius: 4, speed: 4, life: 25, gravity: 0.03, vy: -1.5, type: 'fire'
                        });
                    }
                    break;
                }
            }
        }
    }

    function updateCamera(targetX) {
        const halfW = W / 2;
        let target = targetX - halfW;
        target = Math.max(0, Math.min(target, LEVEL_WIDTH - W));
        camera.x += (target - camera.x) * 0.1;
    }

    // ================================================================
    //  DESENHO DO CENÁRIO (Templo do Fogo)
    // ================================================================
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#1a0a0a');
        grad.addColorStop(0.5, '#2a1a0a');
        grad.addColorStop(1, '#3a1a0a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Colunas de fogo (estáticas)
        ctx.fillStyle = 'rgba(255,60,0,0.08)';
        for (let i = 0; i < 12; i++) {
            const x = (i * 400 + 50 - camera.x * 0.1) % (W + 400) - 200;
            const h = 100 + Math.sin(i * 0.7) * 30;
            ctx.fillRect(x, GROUND_Y - h, 12, h);
            ctx.fillRect(x - 6, GROUND_Y - h + 10, 8, 15);
            ctx.fillRect(x + 10, GROUND_Y - h + 5, 8, 12);
            // Brilho
            ctx.fillStyle = 'rgba(255,100,0,0.05)';
            ctx.fillRect(x - 10, GROUND_Y - h - 10, 32, 8);
        }

        // Lava no fundo (ondas)
        ctx.fillStyle = 'rgba(255,100,0,0.05)';
        for (let i = 0; i < 30; i++) {
            const x = (i * 60 + 20 - camera.x * 0.15) % (W + 40) - 20;
            const y = GROUND_Y - 5 + Math.sin(i * 0.5 + frameCount * 0.01) * 4;
            ctx.fillRect(x, y, 40, 6 + Math.sin(i * 0.3 + frameCount * 0.015) * 3);
        }

        // Fogo e lava (partículas)
        drawFireAndLava(camera.x);
    }

    function drawGround() {
        for (const seg of groundSegments) {
            const sx = seg.x - camera.x;
            if (sx + seg.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = '#4a2a1a';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.fillRect(sx, seg.y, seg.w, 10);
            ctx.shadowBlur = 0;
            const grad = ctx.createLinearGradient(0, seg.y + 10, 0, seg.y + seg.h);
            grad.addColorStop(0, '#3a1a0a');
            grad.addColorStop(1, '#1a0a0a');
            ctx.fillStyle = grad;
            ctx.fillRect(sx, seg.y + 10, seg.w, seg.h - 10);
            // Textura de rocha
            for (let i = 0; i < seg.w; i += 15) {
                ctx.fillStyle = 'rgba(80,40,20,0.2)';
                ctx.fillRect(sx + i + Math.sin(i * 0.3) * 4, seg.y + 12 + Math.sin(i * 0.5) * 4, 4, 6);
            }
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(sx, seg.y + seg.h - 3, seg.w, 3);
        }
        ctx.shadowBlur = 0;
    }

    function drawPlatformsAndBlocks() {
        for (const plat of platforms) {
            const sx = plat.x - camera.x;
            if (sx + plat.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = '#5a3a2a';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.fillRect(sx, plat.y, plat.w, plat.h);
            ctx.fillStyle = '#3a1a0a';
            ctx.fillRect(sx, plat.y + plat.h - 4, plat.w, 4);
            ctx.fillStyle = '#6a4a3a';
            ctx.fillRect(sx, plat.y, plat.w, 3);
            for (let i = 0; i < plat.w; i += 15) {
                ctx.fillStyle = '#2a0a0a';
                ctx.fillRect(sx + i, plat.y + 4, 1, plat.h - 8);
            }
            ctx.shadowBlur = 0;
        }
        for (const mplat of movingPlatforms) {
            const sx = mplat.x - camera.x;
            if (sx + mplat.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = '#5a3a2a';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.fillRect(sx, mplat.y, mplat.w, mplat.h);
            ctx.fillStyle = '#3a1a0a';
            ctx.fillRect(sx, mplat.y + mplat.h - 4, mplat.w, 4);
            ctx.fillStyle = '#6a4a3a';
            ctx.fillRect(sx, mplat.y, mplat.w, 3);
            for (let i = 0; i < mplat.w; i += 15) {
                ctx.fillStyle = '#2a0a0a';
                ctx.fillRect(sx + i, mplat.y + 4, 1, mplat.h - 8);
            }
            ctx.shadowBlur = 0;
        }
        for (const block of questionBlocks) {
            const sx = block.x - camera.x;
            if (sx + block.w < -20 || sx > W + 20) continue;
            if (block.used) {
                ctx.fillStyle = '#2a1a0a';
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.fillRect(sx, block.y, block.w, block.h);
                ctx.fillStyle = '#1a0a0a';
                ctx.fillRect(sx + 2, block.y + 2, block.w - 4, block.h - 4);
                ctx.shadowBlur = 0;
                continue;
            }
            const grad = ctx.createLinearGradient(sx, block.y, sx, block.y + block.h);
            grad.addColorStop(0, '#ff6f00');
            grad.addColorStop(1, '#e65100');
            ctx.fillStyle = grad;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255,100,0,0.4)';
            ctx.fillRect(sx, block.y, block.w, block.h);
            ctx.fillStyle = '#ff8f00';
            ctx.fillRect(sx + 3, block.y + 3, block.w - 6, block.h - 6);
            ctx.fillStyle = '#bf360c';
            ctx.fillRect(sx, block.y, block.w, 2);
            ctx.fillRect(sx, block.y, 2, block.h);
            ctx.fillRect(sx + block.w - 2, block.y, 2, block.h);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const icon = block.powerUp === 'ice' ? '❄' : block.powerUp === 'super' ? '⭐' : block.powerUp === 'cape' ? '🦅' : block.powerUp === 'star' ? '✨' : '?';
            ctx.fillText(icon, sx + block.w/2, block.y + block.h/2 + 1);
        }
        ctx.shadowBlur = 0;
    }

    function drawPipes(offsetX) {
        // sem canos
    }

    function drawCoins(offsetX) {
        for (const coin of coins) {
            const sx = coin.x - offsetX;
            const sy = coin.y + Math.sin(frameCount * 0.06 + coin.x) * 2;
            ctx.shadowColor = 'rgba(255,100,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ff6f00';
            ctx.beginPath();
            ctx.arc(sx + coin.w/2, sy + coin.h/2, coin.w/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffab00';
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('✦', sx + coin.w/2, sy + coin.h/2 + 1);
            ctx.shadowBlur = 0;
        }
    }

    function drawSpikesAndCheckpoints() {
        for (const spike of spikes) {
            const sx = spike.x - camera.x, sy = spike.y;
            if (sx + spike.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = '#4a2a1a';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(60,30,20,0.3)';
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + spike.w/2, sy - spike.h);
            ctx.lineTo(sx + spike.w, sy);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#6a4a3a';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(sx + 2, sy - 2);
            ctx.lineTo(sx + spike.w/2, sy - spike.h + 2);
            ctx.lineTo(sx + spike.w - 2, sy - 2);
            ctx.closePath();
            ctx.fill();
            // Brilho de lava
            ctx.fillStyle = 'rgba(255,100,0,0.15)';
            ctx.beginPath();
            ctx.arc(sx + spike.w/2, sy - spike.h/2, 6, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;
        for (const cp of checkpoints) {
            const sx = cp.x - camera.x, sy = cp.y;
            if (sx + cp.w < -20 || sx > W + 20) continue;
            ctx.fillStyle = cp.active ? '#2ecc71' : '#4a2a1a';
            ctx.shadowColor = cp.active ? 'rgba(46,204,113,0.6)' : 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 20;
            // Totem
            ctx.fillRect(sx + 4, sy, 12, 12);
            ctx.beginPath();
            ctx.arc(sx + cp.w/2, sy + cp.h/2 + 2, cp.w/2 + 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚑', sx + cp.w/2, sy + cp.h/2 + 1);
        }
        ctx.shadowBlur = 0;
    }

    function drawFlag() {
        const fx = FLAG_X - camera.x, fy = FLAG_Y;
        if (fx < -40 || fx > W + 40) return;
        ctx.fillStyle = '#5d4037';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.fillRect(fx + 10, fy, 6, 90);
        ctx.fillStyle = '#8d6e63';
        ctx.fillRect(fx + 12, fy, 2, 90);
        ctx.fillStyle = '#ff6f00';
        ctx.shadowColor = 'rgba(255,100,0,0.5)';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(fx + 13, fy - 4, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        const wave = Math.sin(frameCount * 0.04) * 3;
        if (!levelComplete && !gameWon) {
            ctx.fillStyle = '#ecf0f1';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            ctx.shadowColor = 'rgba(255,255,255,0.6)';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(fx + 16, fy + 8);
            ctx.quadraticCurveTo(fx + 40 + wave, fy + 16, fx + 16, fy + 32);
            ctx.fill();
            ctx.fillStyle = '#ff6f00';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 20;
            ctx.fillText('★', fx + 28 + wave * 0.5, fy + 20);
        }
        ctx.shadowBlur = 0;
    }

    function roundRect(ctx, x, y, w, h, r) {
        if (typeof ctx.roundRect === 'function') { ctx.roundRect(x, y, w, h, r); return; }
        if (r > w/2) r = w/2;
        if (r > h/2) r = h/2;
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
    }

    // ================================================================
    //  LOOP PRINCIPAL
    // ================================================================
    function gameLoop() {
        if (!paused) {
            frameCount++;

            for (const mplat of movingPlatforms) {
                mplat.x += mplat.speed * mplat.dir;
                if (mplat.x >= mplat.xMax || mplat.x <= mplat.xMin) mplat.dir *= -1;
                mplat.vx = mplat.speed * mplat.dir;
            }

            if (levelComplete && nextLevelTimer > 0) {
                nextLevelTimer--;
                if (nextLevelTimer === 0) { window.location.href = 'index.html'; }
            }

            if (!gameWon && !gameOver && lives > 0 && !levelComplete) {
                if ((keys['z'] || keys['Z'] || keys['x'] || keys['X'] || virtKeys.shoot) && player && player.alive && !enteringPipe) {
                    player.shoot();
                }
                if (player) player.update();
                if (player && player.alive) updateCamera(player.x);

                enemies = enemies.filter(e => e.update());
                powerUps = powerUps.filter(pu => pu.update());
                projectiles = projectiles.filter(p => p.update());
                particles = particles.filter(p => p.update());

                handleEnemyCollisions();
                handleProjectileCollisions();

                if (player && !player.alive && lives <= 0) {
                    gameOver = true;
                    statusSpan.textContent = '💀 GAME OVER';
                    sound.playSound('gameOver');
                }
                updateUI();
            }
        }

        ctx.clearRect(0, 0, W, H);
        drawBackground();
        drawGround();
        drawPlatformsAndBlocks();
        drawPipes(camera.x);
        drawCoins(camera.x);
        drawSpikesAndCheckpoints();

        for (const pu of powerUps) pu.draw(ctx, camera.x);
        for (const enemy of enemies) enemy.draw(ctx, camera.x);
        for (const proj of projectiles) proj.draw(ctx, camera.x);
        if (player) player.draw(ctx, camera.x);
        drawFlag();

        for (const p of particles) { p.draw(ctx, camera.x); }

        // Overlays
        if (gameWon) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff6f00';
            ctx.font = 'bold 52px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('🏆 VITÓRIA!', W/2, H/2 - 20);
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText('Parabéns!', W/2, H/2 + 50);
            ctx.shadowBlur = 0;
        } else if (gameOver || lives <= 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 52px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('💀 GAME OVER', W/2, H/2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText('Reinicie ou volte ao mapa', W/2, H/2 + 60);
            ctx.shadowBlur = 0;
        } else if (levelComplete && nextLevelTimer > 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff6f00';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.fillText('⭐ Fase concluída!', W/2, H/2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '22px Arial';
            ctx.fillText('Voltando ao mapa...', W/2, H/2 + 50);
            ctx.shadowBlur = 0;
        } else if (paused) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ff6f00';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.fillText('⏸️ PAUSADO', W/2, H/2);
            ctx.shadowBlur = 0;
        }

        // Barra de progresso
        const progress = Math.min(1, (player ? player.x : 0) / (LEVEL_WIDTH - 100));
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        roundRect(ctx, W - 170, 12, 150, 10, 6);
        ctx.fill();
        ctx.fillStyle = '#ff6f00';
        ctx.beginPath();
        roundRect(ctx, W - 170, 12, Math.max(4, progress * 150), 10, 6);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '8px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('TEMPLO DO FOGO', W - 95, 12);

        requestAnimationFrame(gameLoop);
    }

    // ================================================================
    //  INICIALIZAÇÃO
    // ================================================================
    document.getElementById('soundBtn').textContent = '🔊';
    initFireAndLava();

    loadGame();
    setupVirtualControls();
    gameLoop();

    console.log('🔥 Fase 19 - Templo do Fogo com bolas de fogo e demônios de lava!');
</script>
